    <!-- ── Main ─────────────────────────────────────────────── -->
    <div class="app-main">
      <header class="topbar">
        <button class="topbar-menu" onclick="toggleSidebar()" aria-label="Open menu">

          </svg>
        </button>
        <span class="topbar-title">Payment Register</span>
        <div class="topbar-right"></div>
      </header>

      <main class="page-content">
        <div style="margin-bottom:1.25rem">
          <h1 style="margin:0 0 .25rem;font-size:1.4rem;font-weight:800">💰 Payment Register</h1>
          <p style="margin:0;color:var(--text-muted);font-size:.88rem">Every employee's cycle-wise Approved / Paid / Pending amount, in one list.</p>
        </div>

        <!-- Filter bar -->
        <div style="background:var(--card-bg,#fff);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end">
          <div style="flex:1;min-width:180px">
            <label style="display:block;font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem">Search</label>
            <input class="form-input" type="text" id="pr-search" placeholder="Name or Emp No…" oninput="renderPaymentRegister()" style="height:38px;font-size:.875rem" />
          </div>
          <div style="min-width:160px">
            <label style="display:block;font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem">Payment Status</label>
            <select class="form-select" id="pr-status" onchange="renderPaymentRegister()" style="height:38px;font-size:.875rem">
              <option value="all">All Payments</option>
              <option value="paid">Fully Paid</option>
              <option value="partial">Partially Paid</option>
              <option value="unpaid">Unpaid</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="exportPaymentRegister()" style="height:38px;font-size:.875rem;font-weight:600;border-radius:10px;padding:0 1.1rem">
            ⬇ Export to Excel
          </button>
        </div>

        <div id="pr-table-wrap" style="background:var(--card-bg,#fff);border:1px solid var(--border);border-radius:14px;overflow:hidden">
          <div class="loading-state"><div class="spinner"></div><span>Loading payment register…</span></div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    let currentProfile = null;
    let prRows = [];

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      const profile = await getUserProfile();
      if (!profile) { showMessage('Could not load profile.', 'error'); setTimeout(logout, 2000); return; }
      currentProfile = profile;
      populateSidebar(profile);
      if (!['admin', 'hr', 'audit', 'super_admin'].includes(profile.role)) {
        window.location.href = 'dashboard.html';
        return;
      }

      await loadPaymentRegister();
    })();

    async function loadPaymentRegister() {
      try {
        let expenses = await fetchExpenses();
        // Admin scoped to own dept; hr/audit/super_admin see all
        if (currentProfile.role === 'admin' && currentProfile.department) {
          const myDept = currentProfile.department.toLowerCase().trim();
          expenses = expenses.filter(e => (e.users?.department || '').toLowerCase().trim() === myDept);
        }

        const token = (await db.auth.getSession()).data.session?.access_token;
        const res = await fetch('/api/receipt-url?payments=1', { headers: { Authorization: `Bearer ${token}` } });
        const { payments } = res.ok ? await res.json() : { payments: [] };
        const paidMap = {};
        (payments || []).forEach(p => {
          const k = `${p.user_id}|${p.month_year}|${p.cycle_num}`;
          paidMap[k] = (paidMap[k] || 0) + Number(p.amount_paid || 0);
        });

        // Group expenses by user + month + cycle
        const groups = new Map();
        for (const e of expenses) {
          if (['rejected', 'l1_rejected', 'deleted', 'audit_review', 'audit_query'].includes(e.status)) continue;
          const d = new Date(e.created_at);
          const monthYear = d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
          const cycleNum = d.getDate() <= 15 ? 1 : 2;
          const cycleText = cycleNum === 1 ? '1st - 15th' : '16th - End';
          const key = `${e.user_id}|${monthYear}|${cycleNum}`;
          if (!groups.has(key)) {
            groups.set(key, {
              userId: e.user_id, name: e.users?.name || '—', empNo: e.users?.emp_no || '—',
              department: e.users?.department || '—', monthYear, cycleText,
              yr: d.getFullYear(), mo: d.getMonth(), total: 0,
            });
          }
          const amt = e.approved_amount != null ? +e.approved_amount : +e.amount;
          if (!isNaN(amt)) groups.get(key).total += amt;
        }

        prRows = Array.from(groups.entries()).map(([key, g]) => {
          const paid = paidMap[key] || 0;
          const pending = g.total - paid;
          let status = 'unpaid';
          if (paid > 0.005) status = pending > 0.005 ? 'partial' : 'paid';
          return { ...g, paid, pending, status };
        }).sort((a, b) => (b.yr - a.yr) || (b.mo - a.mo) || a.name.localeCompare(b.name));

        renderPaymentRegister();
      } catch (err) {
        document.getElementById('pr-table-wrap').innerHTML =
          `<div style="padding:2rem;text-align:center;color:var(--text-muted)">Failed to load: ${escHtml(err.message)}</div>`;
      }
    }

    function getFilteredPaymentRows() {
      const search = (document.getElementById('pr-search')?.value || '').toLowerCase().trim();
      const status = document.getElementById('pr-status')?.value || 'all';
      return prRows.filter(r => {
        if (status !== 'all' && r.status !== status) return false;
        if (search && !r.name.toLowerCase().includes(search) && !r.empNo.toLowerCase().includes(search)) return false;
        return true;
      });
    }

    function statusBadge(status) {
      if (status === 'paid') return `<span style="background:#dcfce7;color:#166534;border-radius:6px;padding:2px 9px;font-size:.72rem;font-weight:700">✓ Fully Paid</span>`;
      if (status === 'partial') return `<span style="background:#fef3c7;color:#92400e;border-radius:6px;padding:2px 9px;font-size:.72rem;font-weight:700">◐ Partial</span>`;
      return `<span style="background:#fee2e2;color:#991b1b;border-radius:6px;padding:2px 9px;font-size:.72rem;font-weight:700">○ Unpaid</span>`;
    }

    const PR_BATCH_SIZE = 30;
    let prFiltered = [];
    let prRendered = 0;
    let prObserver = null;

    function paymentRowHtml(r) {
      return `
        <tr style="border-top:1px solid var(--border)">
          <td style="padding:.6rem .9rem">
            <div style="font-weight:700">${escHtml(r.name)}</div>
            <div style="font-size:.72rem;color:var(--text-muted)">${escHtml(r.empNo)}</div>
          </td>
          <td style="padding:.6rem .9rem;color:var(--text-muted)">${escHtml(r.department)}</td>
          <td style="padding:.6rem .9rem;white-space:nowrap">${escHtml(r.monthYear)} <span style="background:var(--primary);color:white;border-radius:5px;padding:0 6px;font-size:.65rem;font-weight:700">${escHtml(r.cycleText)}</span></td>
          <td style="padding:.6rem .9rem;text-align:right;font-weight:600">${formatCurrency(r.total)}</td>
          <td style="padding:.6rem .9rem;text-align:right;color:#166534;font-weight:600">${formatCurrency(r.paid)}</td>
          <td style="padding:.6rem .9rem;text-align:right;color:#92400e;font-weight:600">${r.pending > 0.005 ? formatCurrency(r.pending) : '—'}</td>
          <td style="padding:.6rem .9rem">${statusBadge(r.status)}</td>
        </tr>`;
    }

    function renderPaymentRegister() {
      const rows = getFilteredPaymentRows();
      const wrap = document.getElementById('pr-table-wrap');
      prObserver?.disconnect();
      if (!rows.length) {
        wrap.innerHTML = `<div style="padding:2.5rem;text-align:center;color:var(--text-muted)">No records match this filter.</div>`;
        return;
      }
      wrap.innerHTML = `
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:.85rem">
            <thead>
              <tr style="background:var(--bg-page,#f9fafb)">
                <th style="padding:.65rem .9rem;text-align:left;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Employee</th>
                <th style="padding:.65rem .9rem;text-align:left;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Department</th>
                <th style="padding:.65rem .9rem;text-align:left;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Cycle</th>
                <th style="padding:.65rem .9rem;text-align:right;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Approved</th>
                <th style="padding:.65rem .9rem;text-align:right;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Paid</th>
                <th style="padding:.65rem .9rem;text-align:right;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Pending</th>
                <th style="padding:.65rem .9rem;text-align:left;font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Status</th>
              </tr>
            </thead>
            <tbody id="pr-tbody">
              <tr id="pr-sentinel"><td colspan="7" style="height:1px;padding:0;border:none"></td></tr>
            </tbody>
          </table>
        </div>`;

      prFiltered = rows;
      prRendered = 0;
      loadMorePaymentRows();

      prObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadMorePaymentRows();
      });
      prObserver.observe(document.getElementById('pr-sentinel'));
    }

    function loadMorePaymentRows() {
      if (prRendered >= prFiltered.length) return;
      const next = prFiltered.slice(prRendered, prRendered + PR_BATCH_SIZE);
      const html = next.map(paymentRowHtml).join('');
      document.getElementById('pr-sentinel')?.insertAdjacentHTML('beforebegin', html);
      prRendered += next.length;
    }

    function exportPaymentRegister() {
      const rows = getFilteredPaymentRows();
      if (!rows.length) { showMessage('Nothing to export for this filter.', 'info'); return; }
      const headers = ['Employee', 'Emp No', 'Department', 'Month', 'Cycle', 'Approved', 'Paid', 'Pending', 'Status'];
      const data = rows.map(r => [
        r.name, r.empNo, r.department, r.monthYear, r.cycleText,
        r.total, r.paid, r.pending, r.status === 'paid' ? 'Fully Paid' : r.status === 'partial' ? 'Partial' : 'Unpaid'
      ]);
      const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
      ws['!cols'] = headers.map(h => ({ wch: Math.max(h.length + 2, 14) }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Payment Register');
      XLSX.writeFile(wb, `PaymentRegister_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
  </script>
