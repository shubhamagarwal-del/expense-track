<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

<body>

  <!-- ── Splash Screen ─────────────────────────────────────── -->
  <div id="splash-screen" style="position:fixed;inset:0;background:#ffffff;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;">
    <img src="/logo/logo.png" id="splash-logo"
      style="width:150px;height:150px;border-radius:28px;opacity:0;transform:scale(0.3);transition:opacity 0.5s ease,transform 0.7s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(99,102,241,0.18);"
      alt="ExpenseTrack" />
    <div id="splash-name"
      style="margin-top:18px;font-family:'Space Grotesk',system-ui,sans-serif;font-size:17px;font-weight:700;color:#1e3a8a;opacity:0;transition:opacity 0.5s ease 0.4s;">
      ExpenseTrack
    </div>
    <div id="splash-sub"
      style="margin-top:5px;font-family:system-ui,sans-serif;font-size:11px;color:#64748b;letter-spacing:0.18em;opacity:0;transition:opacity 0.5s ease 0.6s;">
      PORTAL
    </div>
  </div>
  <script>
    (function () {
      var s = document.getElementById('splash-screen');
      var logo = document.getElementById('splash-logo');
      var name = document.getElementById('splash-name');
      var sub = document.getElementById('splash-sub');
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          logo.style.opacity = '1';
          logo.style.transform = 'scale(1)';
          name.style.opacity = '1';
          sub.style.opacity = '1';
        });
      });
      setTimeout(function () {
        s.style.opacity = '0';
        setTimeout(function () { s.style.display = 'none'; }, 500);
      }, 2200);
    })();
  </script>

  <div class="app-layout">

    <!-- Mobile sidebar backdrop -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- ── Sidebar ──────────────────────────────────────────── -->

      <!-- Logo -->

      </div>

      <!-- Navigation links -->
      <div class="sidebar-nav">
        <p class="sidebar-nav-label">Menu</p>

        <a href="dashboard.html" class="sidebar-link active">

          </svg>
          Work Plans

        <a href="add-expense.html" class="sidebar-link" id="sb-add-link">
          <!-- plus icon -->

        <a href="create-user.html" class="sidebar-link" id="sb-create-user-link">

          </svg>

      <!-- User footer -->

    <!-- ── Main ─────────────────────────────────────────────── -->

      <!-- Top bar -->

    </div><!-- .app-main -->

  </div><!-- .app-layout -->

  <!-- ── Approval Modal ─────────────────────────────────────── -->
  <div id="approval-modal" class="modal-overlay" style="display:none">
    <div class="modal-card" style="max-width:520px;width:95vw">
      <div class="modal-header">
        <div>
          <h3 style="margin:0" id="am-title">Review Expense</h3>
          <p style="margin:.25rem 0 0;font-size:.82rem;color:var(--text-muted)" id="am-subtitle"></p>
        </div>
        <button class="modal-close" onclick="closeApprovalModal()">✕</button>
      </div>
      <div class="modal-body" style="display:grid;gap:1rem">
        <!-- Expense summary card -->
        <div style="background:var(--bg-page,#f9fafb);border-radius:12px;padding:1rem;border:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:.75rem;font-size:.875rem">
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Employee</div><strong id="am-emp"></strong></div>
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Category</div><strong id="am-cat"></strong></div>
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Submitted Amount</div><strong id="am-orig" style="color:var(--primary);font-size:1.1rem"></strong></div>
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Date</div><strong id="am-date"></strong></div>

            <span id="am-sa-receipt-pdf" style="display:none;font-size:2rem">📄</span>
            <button type="button" onclick="clearSAReceiptFile()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:.6rem;cursor:pointer;line-height:20px;text-align:center">✕</button>

          <label style="display:flex;align-items:center;gap:.5rem;background:var(--bg-page,#f9fafb);border:1.5px dashed var(--border);border-radius:10px;padding:.65rem 1rem;cursor:pointer;font-size:.82rem;color:var(--text-muted);font-weight:600;transition:border-color .15s"

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    let currentProfile = null;

    // ─── LINE MANAGER LOOKUP (keyed by department) ────────────
    // Hardcoded fallback — overwritten at boot by live Supabase data.
    // Each value is an ARRAY so departments with 2 managers work naturally.
    let DEPT_MANAGERS = {
      'O&M':                          [{ code: 'SSS_0160', name: 'Chirag Panchal',                     phone: '7732917204' }],
      'Lease':                        [{ code: 'SSS_0010', name: 'Vijay Singh',                        phone: '9352523904' }],
      'Liaison':                      [{ code: 'SSS_0024', name: 'Pintu Bairwa (Arun Sir)',             phone: '7891054848' }],
      'Compliance':                   [{ code: 'SSS_0058', name: 'Bhukima Kudiwal',                    phone: '7062047980' }],
      'Accounts':                     [{ code: 'SSS_0064', name: 'Peyush Kedia',                       phone: '8875533830' }],
      'Account':                      [{ code: 'SSS_0064', name: 'Peyush Kedia',                       phone: '8875533830' }],
      'Project - Roof Top, Design':   [{ code: 'SSS_0020', name: 'Ashok Bharia',                       phone: '9529408901' }],
      'Project':                      [
        { code: 'SSS_0268', name: 'Pawan Raj Koodi', phone: '9928096564' },
        { code: 'SSS_0060', name: 'Sagar Gurjar',    phone: '9079370762' },
      ],
      'HR & Admin':                   [{ code: 'SSS_0113', name: 'Navneet Singh',                      phone: '9929986281' }],
      'HR':                           [{ code: 'SSS_0113', name: 'Navneet Singh',                      phone: '9929986281' }],
      'Legal':                        [{ code: 'SSS_0050', name: 'Ritika Sharma (Arun Sir)',            phone: '9821585878' }],
      'Procurement':                  [
        { code: 'SSS_0053', name: 'Shubham Maheshwari', phone: '7014635743' },
        { code: 'SSS_0206', name: 'Rohit Sharma',        phone: '9983804321' },
      ],
      'Transmission Line':            [{ code: 'SSS_0137', name: 'Ramgopal Sharma',                    phone: '9461251687' }],
      'Logistics & Supply Chain':     [{ code: 'SSS_0197', name: 'Ashok Jat',                          phone: '7728871812' }],
      'Logistics':                    [{ code: 'SSS_0197', name: 'Ashok Jat',                          phone: '7728871812' }],
      'Internal Audit & A/C Payable': [{ code: 'SSS_0189', name: 'Anita',                              phone: '8058940971' }],
      'Sales':                        [{ code: 'SSS_0309', name: 'Prashant Kumar Singh (Durgesh Sir)', phone: '6391116991' }],
    };

    /**
     * Look up manager(s) by employee's department name.
     * Returns an array of { code, name, phone } objects, or null.
     * Case-insensitive fallback for department name variations.
     */
    function getLM(dept) {
      if (!dept) return null;
      const trimmed = dept.trim();
      if (DEPT_MANAGERS[trimmed]) return DEPT_MANAGERS[trimmed];
      const lower = trimmed.toLowerCase();
      for (const [key, managers] of Object.entries(DEPT_MANAGERS)) {
        if (key.toLowerCase() === lower) return managers;
      }
      return null;
    }

    /**
     * Rebuild the #f-manager dropdown.
     * Super Admin: shows all managers from DEPT_MANAGERS (not limited to fetched data).
     * Admin: shows managers whose employees appear in the current data set.
     */
    function populateManagerFilter(expenses) {
      const sel = document.getElementById('f-manager');
      if (!sel) return;
      const current = sel.value;
      const names = new Set();

      if (currentProfile.role === 'super_admin') {
        // Populate from full DEPT_MANAGERS so no manager is ever missing
        Object.values(DEPT_MANAGERS).forEach(arr => arr.forEach(m => names.add(m.name)));
      } else {
        expenses.forEach(e => {
          const lms = getLM(e.users?.department);
          if (lms) lms.forEach(m => names.add(m.name));
        });
      }

      sel.innerHTML = '<option value="">All Managers</option>';
      [...names].sort().forEach(managerName => {
        const opt = document.createElement('option');
        opt.value = managerName;
        opt.textContent = `👔 ${managerName}`;
        if (managerName === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    /** Populate #f-employee dropdown — scoped to the currently selected department, if any. */
    function populateEmployeeFilter() {
      const sel = document.getElementById('f-employee');
      if (!sel) return;
      const current = sel.value;
      const deptSel = (document.getElementById('f-dept')?.value || '').trim();
      const source = deptSel
        ? allExpensesFetched.filter(e => (e.users?.department || '').trim() === deptSel)
        : allExpensesFetched;

      const empMap = new Map();
      source.forEach(e => {
        if (e.user_id && e.users?.name) empMap.set(e.user_id, e.users.name);
      });

      sel.innerHTML = '<option value="">All Employees</option>';
      [...empMap.entries()].sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        sel.appendChild(opt);
      });
      if (empMap.has(current)) sel.value = current;
    }

    /** Department dropdown changed — reset employee filter (now stale) and repopulate it. */
    function onDeptFilterChange() {
      const empSel = document.getElementById('f-employee');
      if (empSel) empSel.value = '';
      populateEmployeeFilter();
      refreshListView(true);
    }

    /** Apply the #f-employee dropdown filter. */
    function applyEmployeeSelectFilter(expenses) {
      const sel = (document.getElementById('f-employee')?.value || '').trim();
      if (!sel) return expenses;
      return expenses.filter(e => e.user_id === sel);
    }

    // ─── Boot ─────────────────────────────────────────────────
    (async () => {
      const user = await requireAuth();
      if (!user) return;

      const profile = await getUserProfile();
      if (!profile) {
        showMessage('Could not load your profile. Please log in again.', 'error');
        setTimeout(logout, 2000);
        return;
      }

      currentProfile = profile;
      populateSidebar(profile);
      initTheme();
      enforcePasswordChange(profile);

      // Load live line manager data from Supabase (cached in sessionStorage).
      // Wrapped in try/catch — a missing function or failed API must never
      // block the dashboard from rendering.
      try {
        const liveManagers = await fetchLineManagers();
        if (liveManagers && typeof liveManagers === 'object') DEPT_MANAGERS = liveManagers;
      } catch (_) { /* use hardcoded DEPT_MANAGERS fallback */ }

      if (profile.role === 'admin' || profile.role === 'super_admin') {
        const titleSuffix = profile.role === 'admin' && profile.department ? ` · ${profile.department}` : '';
        document.getElementById('topbar-title').textContent =
          profile.role === 'super_admin' ? 'Super Admin Panel' : `Manager Dashboard${titleSuffix}`;
        renderAdminDashboard();
      } else {
        document.getElementById('topbar-title').textContent = 'My Expenses';
        renderEmployeeDashboard();
      }

      setupRealtime();
    })();

    // ─── REAL-TIME ──────────────────────────────────────────────
    let _rtDebounce = null;

    function setupRealtime() {
      db.channel('rt-dashboard-expenses')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, () => {
          clearTimeout(_rtDebounce);
          _rtDebounce = setTimeout(async () => {
            const isAdmin = currentProfile.role === 'admin' || currentProfile.role === 'super_admin';
            try {
              if (isAdmin) {
                const companyId = currentProfile.role !== 'super_admin' ? (currentProfile.company_id || undefined) : undefined;
                const limit = undefined; // no cap for any role
                const expenses = deptFilter(await fetchExpenses({ companyId, limit }));
                allExpensesFetched = expenses;
                updateAdminStats(expenses);
                refreshListView();
                if (hierarchyMode) renderHierarchyView(expenses);
                renderAdminCharts(expenses);
              } else {
                const expenses = await fetchExpenses({ userId: currentProfile.id });
                allExpensesFetched = expenses;
                updateEmpStats(expenses);
                refreshListView();
              }
            } catch (_) {}
          }, 700);
        })
        .subscribe();
    }

    // ─── EMPLOYEE VIEW ──────────────────────────────────────────
    function renderEmployeeDashboard() {
      // Add "Add Expense" button to topbar on mobile
      document.getElementById('topbar-right').innerHTML =
        `<a href="add-expense.html" class="btn btn-primary btn-sm" style="border-radius:12px; padding: 0.6rem 1.25rem; font-weight:700">
         <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;margin-right:4px">
           <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>

    let allExpensesFetched = [];

    // expense_id -> viewed_at ISO string (current admin has opened this expense's receipts)
    const expenseViews = {};

    /** Fetch which expenses the current admin has already viewed (with receipts). */
    async function loadExpenseViews(ids) {
      if (!ids?.length) return;
      try {
        const token = (await db.auth.getSession()).data.session?.access_token;
        if (!token) return;
        const chunkSize = 200;
        for (let i = 0; i < ids.length; i += chunkSize) {
          const chunk = ids.slice(i, i + chunkSize);
          const res = await fetch('/api/receipt-url?ids=' + encodeURIComponent(chunk.join(',')), {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (!res.ok) return;
          const { views } = await res.json();
          Object.assign(expenseViews, views || {});
        }
      } catch {}
    }

    /** Mark an expense as viewed by current admin (called from receipt modal in app.js). */
    window.markExpenseAsViewed = async function (expenseId) {
      if (!expenseId) return;
      try {
        const token = (await db.auth.getSession()).data.session?.access_token;
        if (!token) return;
        const res = await fetch('/api/receipt-url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ expense_id: expenseId })
        });
        if (!res.ok) return;
        const { viewed_at } = await res.json();
        expenseViews[expenseId] = viewed_at;
        // Patch any visible receipt links for this expense with the seen-badge
        document.querySelectorAll(`[data-rcpt-eid="${expenseId}"]`).forEach(el => {
          if (!el.querySelector('.rcpt-seen-badge')) {
            const span = document.createElement('span');
            span.className = 'rcpt-seen-badge';
            span.style.cssText = 'display:inline-block;margin-left:5px;color:#16a34a;font-size:.7rem;font-weight:700;white-space:nowrap';
            span.textContent = '✓ Seen ' + formatSeenAt(viewed_at);
            el.parentNode.insertBefore(span, el.nextSibling);
          }
        });
        // Update approval modal Approve button if it's currently open for this expense
        if (document.getElementById('approval-modal')?.style.display === 'flex'
            && document.getElementById('am-expense-id')?.value === expenseId) {
          enableApproveButtonIfReady(expenseId);
        }
      } catch {}
    };

    function formatSeenAt(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'numeric', minute:'2-digit', hour12:true });
      } catch { return ''; }
    }

    /** Build the "✓ Seen DD MMM, h:mm AM" suffix HTML for a receipt link. */
    function receiptSeenBadge(expenseId) {
      const at = expenseViews[expenseId];
      if (!at) return '';
      return `<span class="rcpt-seen-badge" style="display:inline-block;margin-left:5px;color:#16a34a;font-size:.7rem;font-weight:700;white-space:nowrap">✓ Seen ${formatSeenAt(at)}</span>`;
    }

    function enableApproveButtonIfReady(expenseId) {
      const btn = document.getElementById('am-approve-btn');
      const note = document.getElementById('am-view-required-note');
      if (!btn) return;
      const e = allExpensesFetched.find(x => x.id === expenseId);
      const hasReceipt = e && parseReceiptUrls(e.receipt_url).length > 0;
      const viewed = !!expenseViews[expenseId];
      if (hasReceipt && !viewed) {
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
        btn.title = 'Please view the receipt before approving';
        if (note) note.style.display = 'block';
      } else {
        btn.disabled = false;
        btn.style.opacity = '';
        btn.style.cursor = '';
        btn.title = '';
        if (note) note.style.display = 'none';
      }
    }

    function deptColor(dept){
      let h = 0;
      for (let i = 0; i < dept.length; i++) h = (h * 31 + dept.charCodeAt(i)) >>> 0;
      return DEPT_ACCENT_COLORS[h % DEPT_ACCENT_COLORS.length];
    }

    // Extract the visited site from a pipe-encoded description field
    function extractSite(e) {
      const parts = (e.description || '').split('|');
      const type  = parts[0];
      if (['TRAVEL','TRAVEL_BUS','TRAVEL_TAXI','TRAVEL_TRAIN','TRAVEL_FLIGHT'].includes(type)) return parts[3] || '';
      if (type === 'TRAVEL_BIKE') return parts[4] || '';
      if (['FOOD','REGULAR','ROOM_RENT','BUS','TAXI','BIKE'].includes(type)) return parts[1] || '';
      if (type === 'OTHER') return parts[2] || '';
      return e.users?.site_name || '';
    }

    // Returns the currently visible/filtered expenses — respects ALL active filters
    function getExportData() {
      let base = activeFilteredExpenses !== null ? [...activeFilteredExpenses] : [...allExpensesFetched];

      // Status: filter-bar dropdown takes priority over the tab selection
      const statusDropdown = (document.getElementById('f-status')?.value || 'all');
      const effectiveStatus = statusDropdown !== 'all' ? statusDropdown : currentListFilter;

      if (effectiveStatus === 'rejected') {
        base = base.filter(e => e.status === 'rejected' || e.status === 'l1_rejected');
      } else if (effectiveStatus !== 'all') {
        base = base.filter(e => e.status === effectiveStatus);
      }

      const search = (document.getElementById('f-user-search')?.value || '').toLowerCase().trim();
      if (search) {
        base = base.filter(e =>
          (e.users?.email || '').toLowerCase().includes(search) ||
          (e.users?.name  || '').toLowerCase().includes(search)
        );
      }

      const managerFilter = (document.getElementById('f-manager')?.value || '').trim();
      if (managerFilter) {
        base = base.filter(e => {
          const lms = getLM(e.users?.department);
          return lms && lms.some(m => m.name === managerFilter);
        });
      }

      base = applyDeptSelectFilter(base);
      base = applyEmployeeSelectFilter(base);

      return base;

    const _debouncedRefresh = debounce(_doRefreshListView, 200);

    function _doRefreshListView(skipCharts = false) {
      const search = document.getElementById('f-user-search')?.value.toLowerCase().trim() || '';
      let filtered = allExpensesFetched;

      // Filter by status tab (rejected covers both l1_rejected and rejected)
      if (currentListFilter === 'rejected') {
        filtered = filtered.filter(e => e.status === 'rejected' || e.status === 'l1_rejected');
      } else if (currentListFilter !== 'all') {
        filtered = filtered.filter(e => e.status === currentListFilter);
      }

      const isAdmin = currentProfile.role === 'admin' || currentProfile.role === 'super_admin';

      // Filter by search string — name OR email (Admins only)
      if (search && isAdmin) {
        filtered = filtered.filter(e =>
          (e.users?.email || '').toLowerCase().includes(search) ||
          (e.users?.name  || '').toLowerCase().includes(search)
        );
      }

      // Filter by line manager
      const managerFilter = (document.getElementById('f-manager')?.value || '').trim();
      if (managerFilter && isAdmin) {
        filtered = filtered.filter(e => {
          const lms = getLM(e.users?.department);
          return lms && lms.some(m => m.name === managerFilter);
        });
      }

      // Filter by department (super_admin UI)
      if (isAdmin) filtered = applyDeptSelectFilter(filtered);

      if (isAdmin) {

    function updateEmpStats(expenses) {
      const now = new Date();
      const approvedAndPending = expenses.filter(e => e.status !== 'rejected' && e.status !== 'l1_rejected');
      const effectiveAmt = e => e.approved_amount != null ? +e.approved_amount : +e.amount;
      const total = approvedAndPending.reduce((s, e) => s + effectiveAmt(e), 0);
      const month = approvedAndPending
        .filter(e => { const d = new Date(e.created_at); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); })
        .reduce((s, e) => s + effectiveAmt(e), 0);
      document.getElementById('s-count').textContent = expenses.length;
      document.getElementById('s-total').textContent = formatCurrency(total);
      document.getElementById('s-month').textContent = formatCurrency(month);
      renderCycleBreakdown(expenses);
    }

    function renderCycleBreakdown(expenses) {
      const el = document.getElementById('emp-cycle-breakdown');
      if (!el) return;
      if (!expenses.length) { el.innerHTML = ''; return; }

      // Build month+cycle groups
      const groups = {};
      expenses.forEach(e => {
        const d = new Date(e.created_at);
        const monthKey = d.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cNum = d.getDate() <= 15 ? 1 : 2;
        const cLabel = cNum === 1 ? '1st–15th' : '16th–End';
        const key = monthKey + '||' + cLabel;
        if (!groups[key]) groups[key] = {
          month: monthKey, cycle: cLabel, cNum,
          sortKey: d.getFullYear() * 1000 + d.getMonth() * 10 + cNum,
          expenses: []
        };
        groups[key].expenses.push(e);
      });

      const sorted = Object.values(groups).sort((a, b) => b.sortKey - a.sortKey);
      const effectiveAmt = e => e.approved_amount != null ? +e.approved_amount : +e.amount;

      el.innerHTML = `
        <div style="font-size:.78rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem">
          📅 Month & Cycle Breakdown

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem">
          ${sorted.map(g => {
            const pending  = g.expenses.filter(e => e.status === 'pending').length;
            const inReview = g.expenses.filter(e => e.status === 'l1_approved').length;
            const approved = g.expenses.filter(e => e.status === 'approved').length;
            const rejected = g.expenses.filter(e => e.status === 'rejected' || e.status === 'l1_rejected').length;
            const totalAmt = g.expenses.reduce((s, e) => s + effectiveAmt(e), 0);
            const col = g.cNum === 1 ? '#6366f1' : '#7c3aed';
            const tagBg  = g.cNum === 1 ? '#ede9fe' : '#f3e8ff';
            const tagCol = g.cNum === 1 ? '#6366f1' : '#7c3aed';
            return `
              <div onclick="filterByCycle('${g.month}','${g.cycle}')"
                   style="background:white;border-radius:14px;padding:1.1rem 1.25rem;border:1.5px solid #e5e7eb;cursor:pointer;transition:all .15s"
                   onmouseover="this.style.borderColor='${col}';this.style.boxShadow='0 4px 16px rgba(99,102,241,.12)'"
                   onmouseout="this.style.borderColor='#e5e7eb';this.style.boxShadow='none'">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem">
                  <div style="font-weight:700;font-size:.92rem;color:#1f2937">${g.month}</div>
                  <span style="background:${tagBg};color:${tagCol};border-radius:6px;padding:2px 8px;font-size:.68rem;font-weight:800;white-space:nowrap">${g.cycle}</span>
                </div>
                <div style="font-size:1.45rem;font-weight:800;color:#111827;margin-bottom:.4rem">${formatCurrency(totalAmt)}</div>
                <div style="font-size:.72rem;color:#9ca3af;margin-bottom:.6rem">${g.expenses.length} record${g.expenses.length !== 1 ? 's' : ''}</div>
                <div style="display:flex;flex-wrap:wrap;gap:.3rem">
                  ${pending  ? `<span style="background:#fef3c7;color:#92400e;border-radius:5px;padding:1px 6px;font-size:.68rem;font-weight:700">⏳ ${pending}</span>` : ''}
                  ${inReview ? `<span style="background:#ede9fe;color:#5b21b6;border-radius:5px;padding:1px 6px;font-size:.68rem;font-weight:700">🔍 ${inReview}</span>` : ''}
                  ${approved ? `<span style="background:#dcfce7;color:#166534;border-radius:5px;padding:1px 6px;font-size:.68rem;font-weight:700">✅ ${approved}</span>` : ''}

                </div>
              </div>`;
          }).join('')}
        </div>`;
    }

    // Filter to own department for Line Managers; super_admin sees all
    function deptFilter(expenses) {
      if (currentProfile.role !== 'admin') return expenses;
      const myDept = (currentProfile.department || '').toLowerCase().trim();
      if (!myDept) return expenses;
      return expenses.filter(e =>
        (e.users?.department || '').toLowerCase().trim() === myDept
      );
    }

    /** Apply the #f-dept dropdown filter (super_admin UI department selector). */
    function applyDeptSelectFilter(expenses) {
      const sel = (document.getElementById('f-dept')?.value || '').trim();
      if (!sel) return expenses;
      return expenses.filter(e => (e.users?.department || '').trim() === sel);
    }

    async function loadAdminExpenses(from, to) {
      try {
        // super_admin sees all companies; admin scoped to their company
        const companyId = currentProfile.role !== 'super_admin' ? (currentProfile.company_id || undefined) : undefined;
        // No row cap for any role — bounded only by Supabase max_rows setting
        const limit = undefined;
        const raw = await fetchExpenses({ from, to, companyId, limit });
        const expenses = deptFilter(raw);
        allExpensesFetched = expenses;
        populateManagerFilter(expenses);
        populateEmployeeFilter();
        updateAdminStats(expenses);
        // Load receipt view audit for expenses that actually have receipts
        const idsWithReceipts = expenses.filter(e => e.receipt_url).map(e => e.id);
        loadExpenseViews(idsWithReceipts).then(() => refreshListView(true));
        refreshListView();
        renderAdminCharts(expenses);
      } catch (err) {
        showMessage('Failed to load expenses: ' + err.message, 'error');
      }
    }

    function updateAdminStats(expenses) {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const effAmt = e => e.approved_amount != null ? +e.approved_amount : +e.amount;

      const active = expenses.filter(e => e.status !== 'rejected' && e.status !== 'l1_rejected');
      const todayTotal = active
        .filter(e => e.created_at.startsWith(today))
        .reduce((s, e) => s + effAmt(e), 0);
      const monthTotal = active
        .filter(e => { const d = new Date(e.created_at); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); })
        .reduce((s, e) => s + effAmt(e), 0);
      const allTotal = active.reduce((s, e) => s + effAmt(e), 0);

      document.getElementById('s-today').textContent = formatCurrency(todayTotal);
      document.getElementById('s-month').textContent = formatCurrency(monthTotal);
      document.getElementById('s-count').textContent = expenses.length;
      document.getElementById('s-total').textContent = formatCurrency(allTotal);

      // Super Admin — extra stat cards
      if (currentProfile.role === 'super_admin') {
        const uniqueEmps   = new Set(expenses.map(e => e.user_id)).size;
        const pendingAct   = expenses.filter(e => e.status === 'pending' || e.status === 'l1_approved').length;
        const approvedAmt  = expenses.filter(e => e.status === 'approved')
          .reduce((s, e) => s + (e.approved_amount != null ? +e.approved_amount : +e.amount), 0);
        const activeDepts  = new Set(expenses.map(e => e.users?.department).filter(Boolean)).size;
        const el = id => document.getElementById(id);
        if (el('sa-emp'))     el('sa-emp').textContent     = uniqueEmps;
        if (el('sa-pending')) el('sa-pending').textContent = pendingAct;
        if (el('sa-approved'))el('sa-approved').textContent= formatCurrency(approvedAmt);
        if (el('sa-depts'))   el('sa-depts').textContent   = activeDepts;
      }
    }

    function renderAdminTable(expenses) {
      const el = document.getElementById('admin-table');
      if (!el) return; // Safety check

      if (!expenses.length) {
        el.innerHTML = emptyState('No expenses found', 'Try selecting a different filter.');
        return;
      }

      // Grouping logic: by user and cycle
      const groups = {};
      expenses.forEach(e => {
        const userId = e.user_id;
        const date = new Date(e.created_at);
        const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cycleNum = date.getDate() <= 15 ? 1 : 2;
        const cycleText = cycleNum === 1 ? "1st - 15th" : "16th - End";
        const groupKey = `${userId}_${monthYear}_${cycleNum}`;

        if (!groups[groupKey]) {
          groups[groupKey] = {
            user: e.users,
            monthYear,
            cycleText,
            totalAmount: 0,
            entries: [],
            days: new Set(),
            status: 'pending'
          };
        }
        groups[groupKey].entries.push(e);
        groups[groupKey].days.add(date.getDate());
      });

      // Compute correct group status and total after all entries are added
      Object.values(groups).forEach(g => {
        const statuses = g.entries.map(e => e.status);
        if (statuses.every(s => s === 'approved')) {
          g.status = 'approved';
        } else if (statuses.every(s => s === 'rejected' || s === 'l1_rejected')) {
          g.status = 'rejected';
        } else if (statuses.some(s => s === 'l1_approved' || s === 'approved')) {
          g.status = 'l1_approved';
        } else if (statuses.some(s => s === 'rejected' || s === 'l1_rejected')) {
          g.status = 'l1_rejected';
        } else {
          g.status = 'pending';
        }
        // Use approved_amount for total, exclude rejected
        g.totalAmount = g.entries.reduce((sum, e) => {
          if (e.status === 'rejected' || e.status === 'l1_rejected') return sum;
          return sum + (e.approved_amount != null ? +e.approved_amount : +e.amount);
        }, 0);
      });

      // Sort groups: group with the most recently created/updated entry first
      const sortedGroups = Object.values(groups).sort((a, b) => {
        const latestA = Math.max(...a.entries.map(e => new Date(e.created_at).getTime()));
        const latestB = Math.max(...b.entries.map(e => new Date(e.created_at).getTime()));
        return latestB - latestA;
      });
      // Sort entries within each group newest-first
      sortedGroups.forEach(g => g.entries.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)));

      const total = expenses.reduce((s, e) => {
        if (e.status === 'rejected' || e.status === 'l1_rejected') return s;
        return s + (e.approved_amount != null ? +e.approved_amount : +e.amount);
      }, 0);
      el.innerHTML = `
      <div class="table-card-header">
        <div>
          <span class="table-card-title">Expense Summaries</span>
          <span class="table-card-count">${sortedGroups.length} group${sortedGroups.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="table-header-total">
          Total: <strong>${formatCurrency(total)}</strong>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Employee Details</th>
              <th>Cycle Period</th>
              <th>Total Amount</th>
              <th>Days (Filled/Missing)</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${sortedGroups.map(g => {
        const year = new Date(g.entries[0].created_at).getFullYear();
        const month = new Date(g.entries[0].created_at).getMonth();
        const startDay = g.cycleText.includes('1st') ? 1 : 16;
        const endDay = g.cycleText.includes('1st') ? 15 : new Date(year, month + 1, 0).getDate();
        const totalDaysInCycle = endDay - startDay + 1;
        const filledCount = g.days.size;
        const pendingCount = totalDaysInCycle - filledCount;
        const safeKey = `${g.user.id}|${g.monthYear}|${g.cycleText}`;
        const lms = getLM(g.user.department);

        return `
                <tr class="summary-row">
                  <td>
                    <div style="font-weight:700; color:var(--text-1)">${escHtml(g.user.name || 'N/A')}</div>
                    <div style="font-size:0.75rem; color:var(--text-3)">${escHtml(g.user.email)}</div>
                    ${lms ? `<div style="font-size:.7rem;color:#059669;font-weight:600;margin-top:3px">👔 ${escHtml(lms.map(m=>m.name).join(' / '))}</div>` : ''}
                  </td>
                  <td><strong>${g.monthYear}</strong><br><small style="color:var(--primary)">${g.cycleText}</small></td>
                  <td style="font-weight:700; color:var(--primary); font-size:1.1rem">${formatCurrency(g.totalAmount)}</td>
                  <td>
                    <div style="display:flex; align-items:center; gap:0.5rem">
                      <span class="status-badge badge-approved" style="padding: 0.1rem 0.4rem; font-size:0.7rem">${filledCount} Filled</span>
                      <span class="status-badge badge-pending" style="padding: 0.1rem 0.4rem; font-size:0.7rem">${pendingCount} Missing</span>
                    </div>
                  </td>
                  <td>${statusBadge(g.status)}</td>
                  <td>
                    <button class="btn btn-primary btn-sm" onclick="toggleDetails('${safeKey}')">View Details</button>
                  </td>
                </tr>
                <tr id="details-${safeKey}" style="display:none; background: var(--bg-1)">

    async function applyCycleFilter() {
      // ── Button feedback ────────────────────────────────────
      const applyBtn = document.querySelector('[onclick="applyCycleFilter()"]');
      if (applyBtn) {
        const orig = applyBtn.innerHTML;
        applyBtn.innerHTML = `<svg style="width:14px;height:14px;margin-right:5px;display:inline;vertical-align:-2px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>Applied!`;
        applyBtn.style.background = '#16a34a';
        setTimeout(() => { applyBtn.innerHTML = orig; applyBtn.style.background = ''; }, 1800);
      }

      const monthVal  = document.getElementById('f-month').value;
      const cyclePart = document.getElementById('f-cycle').value;
      const search    = document.getElementById('f-user-search')?.value.toLowerCase().trim() || '';

      let filtered = allExpensesFetched;

      if (monthVal) {
        const [yr, mo] = monthVal.split('-').map(Number);
        filtered = filtered.filter(e => {
          const d = new Date(e.created_at);
          return d.getFullYear() === yr && (d.getMonth() + 1) === mo;
        });
      }

      if (cyclePart !== 'all') {
        filtered = filtered.filter(e => {
          const day = new Date(e.created_at).getDate();
          if (cyclePart === '1st - 15th') return day >= 1 && day <= 15;
          if (cyclePart === '16th - End') return day >= 16;
          return true;
        });
      }

      // Save month+cycle filtered base so exports pick it up
      activeFilteredExpenses = (monthVal || cyclePart !== 'all') ? filtered : null;

      if (search) {
        filtered = filtered.filter(e =>
          (e.users?.email || '').toLowerCase().includes(search) ||
          (e.users?.name  || '').toLowerCase().includes(search)
        );

        if (monthVal && cyclePart !== 'all') {
          showCycleProgress(filtered, monthVal, cyclePart);
        } else {
          document.getElementById('cycle-progress-card').style.display = 'none';
        }
      } else {
        document.getElementById('cycle-progress-card').style.display = 'none';
      }

      refreshListViewWithCustom(filtered);
    }

    function showCycleProgress(expenses, monthVal, cyclePart) {
      const card = document.getElementById('cycle-progress-card');
      const summary = document.getElementById('progress-summary');
      const bar = document.getElementById('progress-bar-fill');
      const grid = document.getElementById('day-grid');

      card.style.display = 'block';

      const dateObj = new Date(monthVal);
      const year = dateObj.getFullYear();
      const month = dateObj.getMonth();

      let startDay, endDay;
      if (cyclePart === '1st - 15th') {
        startDay = 1; endDay = 15;
      } else {
        startDay = 16;
        endDay = new Date(year, month + 1, 0).getDate();
      }

      const totalDays = endDay - startDay + 1;
      const filledDays = new Set();

      expenses.forEach(e => {
        const d = new Date(e.created_at);
        if (d.getDate() >= startDay && d.getDate() <= endDay) {
          filledDays.add(d.getDate());
        }
      });

      const count = filledDays.size;
      const percent = (count / totalDays) * 100;

      summary.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center">
          <span style="font-size: 1.25rem; font-weight: 700;">${count} / ${totalDays} Days Filled</span>
          <span style="color: ${count === totalDays ? 'var(--green)' : 'var(--red)'}; font-weight: 600;">
            ${totalDays - count} Missing
          </span>
        </div>
      `;

      bar.style.width = `${percent}%`;
      bar.style.background = percent === 100 ? 'var(--green)' : 'var(--primary)';

      let gridHtml = '';
      for (let i = startDay; i <= endDay; i++) {
        const isFilled = filledDays.has(i);
        gridHtml += `
          <div style="
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            background: ${isFilled ? 'var(--green)' : 'var(--bg-3)'};
            color: ${isFilled ? '#fff' : 'var(--text-3)'};
            border: 1px solid ${isFilled ? 'transparent' : 'var(--border)'};
          " title="Day ${i}: ${isFilled ? 'Filled' : 'Missing'}">
            ${i}
          </div>
        `;
      }
      grid.innerHTML = gridHtml;
    }

    function autoUpdateCycleFilter() {
      applyCycleFilter();

    function refreshListViewWithCustom(filteredData) {
      const search = document.getElementById('f-user-search')?.value.toLowerCase().trim() || '';
      let filtered = filteredData;

      if (currentListFilter !== 'all') {
        filtered = filtered.filter(e => e.status === currentListFilter);
      }

      const isAdmin = currentProfile.role === 'admin' || currentProfile.role === 'super_admin';

      if (search && isAdmin) {
        filtered = filtered.filter(e =>
          (e.users?.email || '').toLowerCase().includes(search) ||
          (e.users?.name  || '').toLowerCase().includes(search)
        );
      }

      const managerFilter = (document.getElementById('f-manager')?.value || '').trim();
      if (managerFilter && isAdmin) {
        filtered = filtered.filter(e => {
          const lms = getLM(e.users?.department);
          return lms && lms.some(m => m.name === managerFilter);
        });
      }

      if (isAdmin) filtered = applyDeptSelectFilter(filtered);
      if (isAdmin) filtered = applyEmployeeSelectFilter(filtered);

      if (isAdmin) {
        renderAdminTable(filtered);
        renderAdminCards(filtered);
      } else {
        renderEmpTable(filtered);
        renderEmpCards(filtered);
      }
    }

    function parseDescForDisplay(raw) {
      if (!raw) return '—';
      const p = raw.split('|');
      const type = p[0];

      const TRAVEL_ICONS = { TRAVEL_BUS: '🚌 Bus', TRAVEL_TAXI: '🚕 Taxi', TRAVEL_TRAIN: '🚆 Train', TRAVEL_FLIGHT: '✈️ Flight' };
      const TRAVEL_COLORS = { TRAVEL_BUS: '#0369a1', TRAVEL_TAXI: '#b45309', TRAVEL_TRAIN: '#6d28d9', TRAVEL_FLIGHT: '#92400e' };
      if (TRAVEL_ICONS[type]) {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:${TRAVEL_COLORS[type]};text-transform:uppercase">${TRAVEL_ICONS[type]}</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'TRAVEL_BIKE') {
        const km = escHtml(p[1]||''), from = escHtml(p[2]||''), to = escHtml(p[3]||''), site = escHtml(p[4]||''), desc = escHtml(p[5]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#059669;text-transform:uppercase">🏍️ Bike</span>`,
          km ? `${km} km` : '',
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'FOOD') {
        const site = escHtml(p[1]||''), desc = escHtml(p[2]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#15803d;text-transform:uppercase">🍽️ Food</span>`,
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      // Legacy formats
      if (type === 'TRAVEL') {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:var(--primary);text-transform:uppercase">🚌 Bus</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'BUS') {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#0369a1;text-transform:uppercase">🚌 Bus</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'TAXI') {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#b45309;text-transform:uppercase">🚕 Taxi</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'BIKE') {
        const km = escHtml(p[1]||''), site = escHtml(p[2]||''), desc = escHtml(p[3]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#059669;text-transform:uppercase">🏍️ Bike</span>`,
          km ? `${km} km` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'OTHER') {
        const name = escHtml(p[1]||''), site = escHtml(p[2]||''), desc = escHtml(p[3]||'');
        return [name ? `<strong>${name}</strong>` : '', site ? `📍 ${site}` : '', desc].filter(Boolean).join(' ');
      }
      if (type === 'ROOM_RENT') {
        const site = escHtml(p[1]||''), desc = escHtml(p[2]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#7c3aed;text-transform:uppercase">🏠 Room Rent</span>`,
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'REGULAR') {
        const site = escHtml(p[1]||''), desc = escHtml(p[2]||'');
        return [site ? `📍 ${site}` : '', desc].filter(Boolean).join(' · ') || '—';
      }
      return escHtml(raw);

    async function uploadAndAttachReceipt(expenseId, file) {
      try {
        const url = await uploadReceipt(file, currentProfile.id);
        if (!url) throw new Error('Upload failed');
        const { error } = await db.from('expenses').update({ receipt_url: url }).eq('id', expenseId);
        if (error) throw error;
        const local = allExpensesFetched.find(e => e.id === expenseId);
        if (local) local.receipt_url = url;
        showMessage('Receipt saved!', 'success');
      } catch (err) {
        showMessage('Receipt upload failed: ' + err.message, 'error');
      }
    }

    async function saEditReceipt(expenseId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,application/pdf';
      input.onchange = async () => {
        if (!input.files?.length) return;
        const btn = document.querySelector(`[data-sa-edit="${expenseId}"]`);
        const orig = btn?.textContent;
        if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
        try {
          await uploadAndAttachReceipt(expenseId, input.files[0]);
          await loadAdminExpenses();
        } finally {
          if (btn) { btn.disabled = false; btn.textContent = orig; }
        }
      };
      input.click();

      const e = allExpensesFetched.find(x => x.id === expenseId);
      if (!e) return;

    async function submitApprovalAction(action) {
      const expenseId = document.getElementById('am-expense-id').value;
      const approvedAmount = parseFloat(document.getElementById('am-amount').value);
      const remark = document.getElementById('am-remark').value.trim();
      const e = allExpensesFetched.find(x => x.id === expenseId);
      if (!e) return;

      // Receipt-view enforcement (only on approve, only when receipts exist)
      if (action === 'approved') {
        const hasReceipt = parseReceiptUrls(e.receipt_url).length > 0;
        if (hasReceipt && !expenseViews[expenseId]) {
          showMessage('Please open and view the receipt before approving.', 'error');
          return;
        }
      }

      if (action === 'rejected' && !remark) {
        showMessage('A remark is required when rejecting.', 'error');
        return;
      }
      const amtChanged = !isNaN(approvedAmount) && approvedAmount !== +e.amount;
      if (amtChanged && !remark) {
        showMessage('A remark is required when changing the approved amount.', 'error');
        return;
      }

      const btnId = action === 'approved' ? 'am-approve-btn' : 'am-reject-btn';
      const btn = document.getElementById(btnId);
      setLoading(btn, true);

      try {
        const { data: { session } } = await db.auth.getSession();
        const token = session?.access_token;
        if (!token) throw new Error('Not authenticated');

        const payload = { expense_id: expenseId, action, remark: remark || null };
        if (amtChanged) payload.approved_amount = approvedAmount;

        const res = await fetch('/api/approve-expense', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { throw new Error('Server error: ' + text.substring(0, 120)); }
        if (!res.ok) throw new Error(data.error || 'Approval failed');

        showMessage(`Expense ${action === 'approved' ? 'approved' : 'rejected'} successfully!`, 'success');

        // Super Admin: upload receipt if one was selected
        if (currentProfile.role === 'super_admin') {
          const fi = document.getElementById('am-sa-receipt-file');
          if (fi?.files?.length) await uploadAndAttachReceipt(expenseId, fi.files[0]);
        }

        closeApprovalModal();
        await loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    async function approveEntireCycle(safeKey, triggerBtn) {
      const [userId, monthYear, cycleText] = safeKey.split('|');
      const isL1 = currentProfile.role === 'admin';
      const isL2 = currentProfile.role === 'super_admin';

      const toApprove = allExpensesFetched.filter(e => {
        const date = new Date(e.created_at);
        const mY = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cNum = date.getDate() <= 15 ? 1 : 2;
        const cT = cNum === 1 ? "1st - 15th" : "16th - End";
        if (!(e.user_id === userId && mY === monthYear && cT === cycleText)) return false;
        if (isL1) return e.status === 'pending';
        if (isL2) return e.status === 'pending' || e.status === 'l1_approved';
        return false;
      });

      if (!toApprove.length) {
        showMessage('No eligible expenses to approve in this cycle.', 'info');
        return;
      }

      if (!confirm(`Approve all ${toApprove.length} expense${toApprove.length !== 1 ? 's' : ''} in this cycle?`)) return;

      // ── Button loading state ────────────────────────────────
      const btn = triggerBtn || event?.currentTarget || null;
      const origText = btn?.innerHTML;
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<span style="display:inline-flex;align-items:center;gap:.35rem"><span style="width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span>Approving ${toApprove.length}…</span>`;
      }

      try {
        const { data: { session } } = await db.auth.getSession();
        const token = session?.access_token;
        if (!token) throw new Error('Not authenticated');

        const res = await fetch('/api/approve-expense', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ expense_ids: toApprove.map(e => e.id) })
        });

        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Bulk approval failed');

        const { approved, skipped, elapsed_ms } = json;
        const elapsed = elapsed_ms < 1000 ? `${elapsed_ms}ms` : `${(elapsed_ms/1000).toFixed(1)}s`;
        showMessage(
          `✅ ${approved} expense${approved !== 1 ? 's' : ''} approved successfully` +
          (skipped ? ` (${skipped} skipped)` : '') +
          ` · ${elapsed}`,
          'success'
        );

        await loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = origText;
        }
      }
    }

    async function deleteExpense(id) {
      if (!confirm("Are you sure you want to delete this expense?")) return;
      try {
        const { error } = await db.from('expenses').delete().eq('id', id);
        if (error) throw error;
        showMessage('Expense deleted!', 'success');
        await loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    async function promptRejectExpense(id) {
      const reason = prompt("Please enter a reason for rejecting this expense:");
      if (reason === null) return; // User cancelled
      if (!reason.trim()) {
        showMessage("A rejection reason is required for rejection.", "error");
        return;
      }
      await updateExpenseStatus(id, 'rejected', reason.trim());
    }

    async function updateExpenseStatus(id, status, reason = null) {
      try {
        const updateData = { status };
        if (reason) updateData.rejection_reason = reason;

        const { error } = await db
          .from('expenses')
          .update(updateData)
          .eq('id', id);

        if (error) throw error;

        // Send notification
        const expense = allExpensesFetched.find(e => e.id === id);
        if (expense && expense.users?.email) {
          notifyUser(expense.users.email, status, reason);
        }

        showMessage(`Expense ${status} successfully.`, 'success');

        // Reload admin expenses to update the view
        const from = document.getElementById('f-from')?.value || undefined;
        const to = document.getElementById('f-to')?.value || undefined;
        await loadAdminExpenses(from, to);
      } catch (err) {
        showMessage(err.message || 'Failed to update status.', 'error');
      }
    }

    let categoryChartInstance = null;

    function renderAdminCharts(expenses) {
      const active = expenses.filter(e => e.status !== 'rejected');
      if (!active.length) {
        if (document.getElementById('admin-charts-section')) document.getElementById('admin-charts-section').style.display = 'none';
        return;
      }
      if (document.getElementById('admin-charts-section')) document.getElementById('admin-charts-section').style.display = 'grid';

      const catData = {};
      active.forEach(e => { catData[e.category] = (catData[e.category] || 0) + +e.amount; });

      const ctxCat = document.getElementById('categoryChart')?.getContext('2d');
      if (!ctxCat) return;
      if (categoryChartInstance) categoryChartInstance.destroy();
      categoryChartInstance = new Chart(ctxCat, {
        type: 'doughnut',
        data: {
          labels: Object.keys(catData),
          datasets: [{
            data: Object.values(catData),
            backgroundColor: ['#6366f1', '#8b5cf6', '#f59e0b', '#22c55e', '#ef4444', '#ec4899'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } }
        }
      });
    }

    /** Unified helper to trigger a browser download with a specific filename */
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 100);
      showMessage(`Download started: ${filename} 📊`, 'success');
    }

    /** Set export button to loading state; returns restore function */
    function setExportLoading(btnId, loadingText) {
      const btn = document.getElementById(btnId);
      if (!btn) return () => {};
      const orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:4px"></span>${loadingText}`;
      return () => { btn.disabled = false; btn.innerHTML = orig; };
    }

    /** Auto-fit column widths for a SheetJS worksheet */
    function autoFitCols(ws, headerRow, dataRows) {
      const allRows = [headerRow, ...dataRows];
      const widths = headerRow.map((_, ci) => {
        let max = 8;
        allRows.forEach(row => {
          const len = String(row[ci] ?? '').length;
          if (len > max) max = len;
        });
        return { wch: Math.min(max + 2, 60) };
      });
      ws['!cols'] = widths;
    }

    /** Internal helper to perform Excel generation from a list of expenses */
    function performExcelExport(expenses, filename = 'Export.xlsx') {
      if (typeof XLSX === 'undefined') {
        return showMessage('Excel library not loaded. Please refresh and try again.', 'error');
      }
      if (!expenses.length) return showMessage('No data to export', 'error');

      const safeFilename = (filename.replace(/[^a-z0-9._\- ]/gi, '_'));
      const finalFilename = safeFilename.endsWith('.xlsx') ? safeFilename : safeFilename + '.xlsx';

      // Sort oldest → newest before writing rows
      const sorted = [...expenses].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

      // ── Sheet 1: Expenses ──────────────────────────────────
      const headers = [
        "Date", "Cycle", "Submitted At", "Name", "Emp No", "Mobile",
        "Department", "Site", "Category", "From (Travel)", "To (Travel)",
        "Description", "Submitted Amount", "Approved Amount", "Status",
        "Bank Holder", "Bank Name", "Bank IFSC", "Bank Account",
        "L1 Approver", "L1 Date", "L1 Remark",
        "L2 Approver", "L2 Date", "L2 Remark", "Admin Comment"
      ];

      const rows = sorted.map(e => {
        const u = e.users || {};
        const parts = (e.description || '').split('|');
        const type = parts[0];
        let d = e.description, f = '', t = '';
        if (type === 'TRAVEL') { f = parts[1]; t = parts[2]; d = parts[4]; }
        else if (['TRAVEL_BUS','TRAVEL_TAXI','TRAVEL_TRAIN','TRAVEL_FLIGHT'].includes(type)) { f = parts[1]; t = parts[2]; d = parts[4]; }
        else if (type === 'TRAVEL_BIKE') { d = parts[5]; }
        else if (type === 'OTHER') { d = `(${parts[1]}) ${parts[3]}`; }
        else if (type === 'REGULAR') { d = parts[2]; }
        else if (type === 'FOOD') { d = parts[2]; }
        else if (type === 'ROOM_RENT') { d = parts[2]; }
        const s = extractSite(e) || u.site_name || '';
        const date = new Date(e.created_at);
        const cycle = date.getDate() <= 15 ? "1st - 15th" : "16th - End";
        const approvedAmt = e.approved_amount != null ? e.approved_amount : e.amount;
        const bankAcct = u.bank_account || '';
        return [
          formatDate(e.created_at), cycle, formatDateTime(e.created_at),
          u.name || '', u.emp_no || '', u.phone || '', u.department || '',
          s, e.category, f, t, d,
          Number(e.amount) || 0, Number(approvedAmt) || 0, e.status,
          u.bank_holder || '', u.bank_name || '', u.bank_ifsc || '', bankAcct,
          e.l1_by_name || '', e.l1_at ? formatDateTime(e.l1_at) : '', e.l1_remark || '',
          e.l2_by_name || '', e.l2_at ? formatDateTime(e.l2_at) : '', e.l2_remark || '',
          e.rejection_reason || ''
        ];
      });

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      // Freeze header row
      ws['!freeze'] = { xSplit: 0, ySplit: 1 };
      autoFitCols(ws, headers, rows);

      // ── Sheet 2: Site Summary ──────────────────────────────
      const siteMap = {};
      sorted.forEach(e => {
        if (e.status === 'rejected' || e.status === 'l1_rejected') return;
        const u = e.users || {};
        const empKey = (u.name || u.email || e.user_id);
        const site   = extractSite(e) || u.site_name || 'Unassigned';
        const amt    = e.approved_amount != null ? +e.approved_amount : +e.amount;
        if (!siteMap[empKey]) siteMap[empKey] = { name: u.name || '', emp_no: u.emp_no || '', dept: u.department || '', sites: {} };
        if (!siteMap[empKey].sites[site]) siteMap[empKey].sites[site] = { total: 0, days: new Set(), count: 0 };
        siteMap[empKey].sites[site].total += amt;
        siteMap[empKey].sites[site].days.add(new Date(e.created_at).toDateString());
        siteMap[empKey].sites[site].count++;
      });

      const siteHeaders = ['Employee', 'Emp No', 'Department', 'Site', 'Visits', 'Days Worked', 'Total Amount'];
      const siteRows = [];
      Object.values(siteMap).forEach(emp => {
        let empTotal = 0;
        Object.entries(emp.sites).sort(([a],[b]) => a.localeCompare(b)).forEach(([site, data]) => {
          siteRows.push([emp.name, emp.emp_no, emp.dept, site, data.count, data.days.size, data.total]);
          empTotal += data.total;
        });
        siteRows.push(['', '', '', `★ TOTAL — ${emp.name}`, '', '', empTotal]);
        siteRows.push([]);
      });

      const wsSite = XLSX.utils.aoa_to_sheet([siteHeaders, ...siteRows]);
      ws['!freeze'] = { xSplit: 0, ySplit: 1 };
      autoFitCols(wsSite, siteHeaders, siteRows);

      // ── Sheet 3: Employee Summary ──────────────────────────
      // Group by employee → cycle → total + approval info
      const empMap = {};
      sorted.forEach(e => {
        if (e.status === 'rejected' || e.status === 'l1_rejected') return;
        const u = e.users || {};
        const empKey = u.emp_no || u.name || e.user_id;
        const date = new Date(e.created_at);
        const cycle = date.getDate() <= 15 ? '1st - 15th' : '16th - End';
        const amt = e.approved_amount != null ? +e.approved_amount : +e.amount;
        if (!empMap[empKey]) empMap[empKey] = { name: u.name || '', emp_no: u.emp_no || '', dept: u.department || '', cycles: {} };
        if (!empMap[empKey].cycles[cycle]) empMap[empKey].cycles[cycle] = { total: 0, l1_name: '', l1_at: '', l2_name: '', l2_at: '' };
        empMap[empKey].cycles[cycle].total += amt;
        // Track latest approval info (overwrite with each expense — last one wins)
        if (e.l1_by_name) empMap[empKey].cycles[cycle].l1_name = e.l1_by_name;
        if (e.l1_at)      empMap[empKey].cycles[cycle].l1_at   = formatDateTime(e.l1_at);
        if (e.l2_by_name) empMap[empKey].cycles[cycle].l2_name = e.l2_by_name;
        if (e.l2_at)      empMap[empKey].cycles[cycle].l2_at   = formatDateTime(e.l2_at);
      });

      const empSumHeaders = [
        'Employee Name', 'Emp No', 'Department', 'Cycle',
        'L1 By', 'L1 At', 'L2 By', 'L2 At',
        'Total Amount'
      ];
      const empSumRows = [];
      let grandTotal = 0;

      Object.values(empMap)
        .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
        .forEach(emp => {
          let empTotal = 0;
          const cycleOrder = ['1st - 15th', '16th - End'];
          cycleOrder.forEach(cycle => {
            if (emp.cycles[cycle] !== undefined) {
              const c = emp.cycles[cycle];
              empSumRows.push([emp.name, emp.emp_no, emp.dept, cycle, c.l1_name, c.l1_at, c.l2_name, c.l2_at, c.total]);
              empTotal += c.total;
            }
          });
          Object.entries(emp.cycles).forEach(([cycle, c]) => {
            if (!cycleOrder.includes(cycle)) {
              empSumRows.push([emp.name, emp.emp_no, emp.dept, cycle, c.l1_name, c.l1_at, c.l2_name, c.l2_at, c.total]);
              empTotal += c.total;
            }
          });
          empSumRows.push(['', '', '', `★ Total — ${emp.name}`, '', '', '', '', empTotal]);
          empSumRows.push([]);
          grandTotal += empTotal;
        });

      empSumRows.push(['', '', '', '★★ GRAND TOTAL', '', '', '', '', grandTotal]);

      const wsEmpSum = XLSX.utils.aoa_to_sheet([empSumHeaders, ...empSumRows]);
      wsEmpSum['!freeze'] = { xSplit: 0, ySplit: 1 };
      autoFitCols(wsEmpSum, empSumHeaders, empSumRows);

      // ── Build workbook ─────────────────────────────────────
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Expenses");
      XLSX.utils.book_append_sheet(wb, wsSite, "Site Summary");
      XLSX.utils.book_append_sheet(wb, wsEmpSum, "Employee Summary");

      try {
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        triggerDownload(blob, finalFilename);
        showMessage(`✅ Excel exported — ${expenses.length} records across 3 sheets`, 'success');
      } catch (err) {
        console.error('Excel Export Error:', err);
        showMessage('Failed to generate Excel file.', 'error');
      }
    }

    // ─── PAYMENT SHEET EXPORT ────────────────────────────────────
    // Generates the bank-ready payment sheet:
    //   305957 | STOCKWELL SOLAR SERVICES PVT LTD | 38115536075 |
    //   <NEFT|DCR> | <Beneficiary> | <Acct No> | <IFSC> | <Amount> | <Description>
    // One row per (employee × month × cycle). Amount = sum of approved expenses
    // for that cycle (rejected entries excluded). DCR if IFSC starts with "SBIN".
    function buildPaymentSheet(expenses) {
      // Group by user + month + cycle (track cycle's calendar year/month for end-date calc)
      const groups = new Map();
      for (const e of expenses) {
        if (e.status === 'rejected' || e.status === 'l1_rejected') continue;
        const date = new Date(e.created_at);
        const mY = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cNum = date.getDate() <= 15 ? 1 : 2;
        const cT = cNum === 1 ? '1st - 15th' : '16th - End';
        const key = `${e.user_id}|${mY}|${cT}`;
        if (!groups.has(key)) {
          groups.set(key, {
            user: e.users || {}, monthYear: mY, cycleText: cT,
            yr: date.getFullYear(), mo: date.getMonth(), cNum, total: 0
          });
        }
        const g = groups.get(key);
        const amt = e.approved_amount != null ? +e.approved_amount : +e.amount;
        if (!isNaN(amt)) g.total += amt;
      }

      const ordinal = n => {
        if (n % 100 >= 11 && n % 100 <= 13) return n + 'th';
        switch (n % 10) { case 1: return n + 'st'; case 2: return n + 'nd'; case 3: return n + 'rd'; default: return n + 'th'; }
      };

      const rows = [];
      for (const g of groups.values()) {
        if (g.total <= 0) continue; // skip empty cycles
        const u = g.user;
        const ifsc = (u.bank_ifsc || '').trim().toUpperCase();
        const mode = ifsc.startsWith('SBIN') ? 'DCR' : 'NEFT';
        const beneficiary = u.bank_holder || u.name || '';
        // "End" -> actual last day of that month (e.g. "16th_-_30th" for April)
        const cyclePart = g.cNum === 1
          ? '1st_-_15th'
          : `16th_-_${ordinal(new Date(g.yr, g.mo + 1, 0).getDate())}`;
        // e.g. "Sanwarmal_Expenses_April_2026_16th_-_30th"
        const desc = `${(u.name || 'Employee').replace(/\s+/g, ' ').trim()}_Expenses_${g.monthYear.replace(/\s+/g, '_')}_${cyclePart}`;
        rows.push([
          '305957',
          'STOCKWELL SOLAR SERVICES PVT LTD',
          '38115536075',
          mode,
          beneficiary,
          u.bank_account || '',
          ifsc,
          Math.round(g.total * 100) / 100,
          desc,
        ]);
      }
      return rows;
    }

    function performPaymentSheetExport(expenses, filename = 'PaymentSheet.xlsx') {
      if (typeof XLSX === 'undefined') {
        return showMessage('Excel library not loaded. Please refresh and try again.', 'error');
      }
      const rows = buildPaymentSheet(expenses);
      if (!rows.length) return showMessage('No payable cycles in current filter', 'error');

      const safeFilename = filename.replace(/[^a-z0-9._\- ]/gi, '_');
      const finalFilename = safeFilename.endsWith('.xlsx') ? safeFilename : safeFilename + '.xlsx';

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [
        { wch: 8 }, { wch: 38 }, { wch: 14 }, { wch: 6 }, { wch: 22 },
        { wch: 22 }, { wch: 14 }, { wch: 10 }, { wch: 42 }
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Payment Sheet');
      XLSX.writeFile(wb, finalFilename);
      showMessage(`Payment sheet downloaded — ${rows.length} payment${rows.length !== 1 ? 's' : ''}`, 'success');
    }
