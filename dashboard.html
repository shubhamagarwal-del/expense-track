<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseTrack — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <meta name="theme-color" content="#6366f1" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="mobile-web-app-capable" content="yes" />

</head>

<body>

  <div class="app-layout">

    <!-- Mobile sidebar backdrop -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <nav class="sidebar" id="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <div class="logo-icon">💰</div>
        <span class="logo-text">ExpenseTrack</span>
      </div>

      <!-- Navigation links -->
      <div class="sidebar-nav">
        <p class="sidebar-nav-label">Menu</p>

        <a href="dashboard.html" class="sidebar-link active">
          <!-- home icon -->
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </a>

        <a href="plans.html" class="sidebar-link" id="sb-plans-link">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          Work Plans
        </a>

        <a href="add-expense.html" class="sidebar-link" id="sb-add-link">
          <!-- plus icon -->
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          Add Expense
        </a>

        <a href="create-user.html" class="sidebar-link" id="sb-create-user-link">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
          Create User
        </a>

        <a href="manage-users.html" class="sidebar-link" id="sb-manage-users-link">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Manage Users
        </a>

        <a href="help.html" class="sidebar-link" id="sb-help-link">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Help Center
        </a>
      </div>

      <!-- User footer -->
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar" id="sb-avatar">?</div>
          <div>
            <div class="sidebar-user-email" id="sb-email">Loading…</div>
            <div class="sidebar-user-role" id="sb-role">—</div>
          </div>
          <button class="sidebar-btn" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Dark Mode</span>
          </button>
          <button class="sidebar-btn" onclick="logout()">
            <!-- logout icon -->
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Sign Out
          </button>
        </div>

        <!-- Bulk Action Bar -->
        <div id="bulk-bar" class="bulk-bar">
          <span class="bulk-info" id="bulk-count-text">0 items selected</span>
          <div style="display:flex; gap: 0.5rem">
            <button class="btn btn-primary btn-sm" onclick="bulkStatusUpdate('approved')">Approve Selected</button>
            <button class="btn btn-secondary btn-sm" onclick="bulkStatusUpdate('rejected')">Reject Selected</button>
          </div>
        </div>

    </nav><!-- .sidebar -->

    <!-- ── Main ─────────────────────────────────────────────── -->
    <div class="app-main">

      <!-- Top bar -->
      <header class="topbar">
        <button class="topbar-menu" onclick="toggleSidebar()" aria-label="Open menu">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <span class="topbar-title" id="topbar-title">Dashboard</span>
        <div class="topbar-right" id="topbar-right"></div>
      </header>

      <!-- Page content (injected by JS) -->
      <main class="page-content" id="main-content">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Loading your dashboard…</span>
        </div>
      </main>

    </div><!-- .app-main -->

  </div><!-- .app-layout -->

  <!-- ── Approval Modal ─────────────────────────────────────── -->
  <div id="approval-modal" class="modal-overlay" style="display:none">
    <div class="modal-card" style="max-width:520px;width:95vw">
      <div class="modal-header">
        <div>
          <h3 style="margin:0" id="am-title">Review Expense</h3>
          <p style="margin:.25rem 0 0;font-size:.82rem;color:var(--text-muted)" id="am-subtitle"></p>
        </div>
        <button class="modal-close" onclick="closeApprovalModal()">✕</button>
      </div>
      <div class="modal-body" style="display:grid;gap:1rem">
        <!-- Expense summary card -->
        <div style="background:var(--bg-page,#f9fafb);border-radius:12px;padding:1rem;border:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:.75rem;font-size:.875rem">
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Employee</div><strong id="am-emp"></strong></div>
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Category</div><strong id="am-cat"></strong></div>
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Submitted Amount</div><strong id="am-orig" style="color:var(--primary);font-size:1.1rem"></strong></div>
          <div><div style="font-size:.7rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:2px">Date</div><strong id="am-date"></strong></div>
        </div>
        <input type="hidden" id="am-expense-id">
        <!-- Receipt -->
        <div id="am-receipt-row" style="display:none;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:.65rem 1rem;align-items:center;gap:.75rem">
          <span style="font-size:.82rem;color:#065f46;font-weight:600">📎 Receipt attached</span>
          <a id="am-receipt-link" href="javascript:void(0)" style="font-size:.82rem;font-weight:700;color:var(--primary);margin-left:auto">View Receipt →</a>
        </div>
        <!-- Approved amount -->
        <div class="form-group" style="margin:0">
          <label class="form-label">Approved Amount (₹)
            <span style="font-size:.72rem;color:var(--text-muted);font-weight:500"> — edit if different from submitted</span>
          </label>
          <input type="number" class="form-input" id="am-amount" step="0.01" min="0" oninput="onAmountChange()">
        </div>
        <!-- Remark -->
        <div class="form-group" style="margin:0">
          <label class="form-label">Remark / Comment
            <span id="am-remark-req" style="color:#dc2626;font-size:.72rem;display:none"> * required</span>
          </label>
          <textarea class="form-input" id="am-remark" rows="3" placeholder="Add a remark (required when changing amount or rejecting)…"></textarea>
        </div>
      </div>
      <div class="modal-footer" style="gap:.75rem">
        <button class="btn btn-secondary" onclick="closeApprovalModal()">Cancel</button>
        <button class="btn btn-secondary" id="am-reject-btn"
          style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-weight:700"
          onclick="submitApprovalAction('rejected')">✕ Reject</button>
        <button class="btn btn-primary" id="am-approve-btn"
          onclick="submitApprovalAction('approved')">✓ Approve</button>
      </div>
    </div>
  </div>

  <!-- Custom Comment Modal (Static) -->
  <div id="comment-modal" class="modal-overlay" style="display:none">
    <div class="modal-card" style="max-width: 450px;">
      <div class="modal-header">
        <h3 id="modal-title">Admin Comment</h3>
        <button class="modal-close" onclick="closeCommentModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modal-expense-id">
        <div class="form-group">
          <label class="form-label">Message / Feedback</label>
          <textarea id="modal-comment-text" class="form-input" rows="4"
            placeholder="Enter your feedback here..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCommentModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveModalComment()">Save Comment</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    let currentProfile = null;

    // ─── LINE MANAGER LOOKUP (keyed by department) ────────────
    // Hardcoded fallback — overwritten at boot by live Supabase data.
    // Each value is an ARRAY so departments with 2 managers work naturally.
    let DEPT_MANAGERS = {
      'O&M':                          [{ code: 'SSS_0160', name: 'Chirag Panchal',                     phone: '7732917204' }],
      'Lease':                        [{ code: 'SSS_0010', name: 'Vijay Singh',                        phone: '9352523904' }],
      'Liaison':                      [{ code: 'SSS_0024', name: 'Pintu Bairwa (Arun Sir)',             phone: '7891054848' }],
      'Compliance':                   [{ code: 'SSS_0058', name: 'Bhukima Kudiwal',                    phone: '7062047980' }],
      'Accounts':                     [{ code: 'SSS_0064', name: 'Peyush Kedia',                       phone: '8875533830' }],
      'Account':                      [{ code: 'SSS_0064', name: 'Peyush Kedia',                       phone: '8875533830' }],
      'Project - Roof Top, Design':   [{ code: 'SSS_0020', name: 'Ashok Bharia',                       phone: '9529408901' }],
      'Project':                      [
        { code: 'SSS_0268', name: 'Pawan Raj Koodi', phone: '9928096564' },
        { code: 'SSS_0060', name: 'Sagar Gurjar',    phone: '9079370762' },
      ],
      'HR & Admin':                   [{ code: 'SSS_0113', name: 'Navneet Singh',                      phone: '9929986281' }],
      'HR':                           [{ code: 'SSS_0113', name: 'Navneet Singh',                      phone: '9929986281' }],
      'Legal':                        [{ code: 'SSS_0050', name: 'Ritika Sharma (Arun Sir)',            phone: '9821585878' }],
      'Procurement':                  [
        { code: 'SSS_0053', name: 'Shubham Maheshwari', phone: '7014635743' },
        { code: 'SSS_0206', name: 'Rohit Sharma',        phone: '9983804321' },
      ],
      'Transmission Line':            [{ code: 'SSS_0137', name: 'Ramgopal Sharma',                    phone: '9461251687' }],
      'Logistics & Supply Chain':     [{ code: 'SSS_0197', name: 'Ashok Jat',                          phone: '7728871812' }],
      'Logistics':                    [{ code: 'SSS_0197', name: 'Ashok Jat',                          phone: '7728871812' }],
      'Internal Audit & A/C Payable': [{ code: 'SSS_0189', name: 'Anita',                              phone: '8058940971' }],
      'Sales':                        [{ code: 'SSS_0309', name: 'Prashant Kumar Singh (Durgesh Sir)', phone: '6391116991' }],
    };

    /**
     * Look up manager(s) by employee's department name.
     * Returns an array of { code, name, phone } objects, or null.
     * Case-insensitive fallback for department name variations.
     */
    function getLM(dept) {
      if (!dept) return null;
      const trimmed = dept.trim();
      if (DEPT_MANAGERS[trimmed]) return DEPT_MANAGERS[trimmed];
      const lower = trimmed.toLowerCase();
      for (const [key, managers] of Object.entries(DEPT_MANAGERS)) {
        if (key.toLowerCase() === lower) return managers;
      }
      return null;
    }

    /**
     * Rebuild the #f-manager dropdown.
     * Super Admin: shows all managers from DEPT_MANAGERS (not limited to fetched data).
     * Admin: shows managers whose employees appear in the current data set.
     */
    function populateManagerFilter(expenses) {
      const sel = document.getElementById('f-manager');
      if (!sel) return;
      const current = sel.value;
      const names = new Set();

      if (currentProfile.role === 'super_admin') {
        // Populate from full DEPT_MANAGERS so no manager is ever missing
        Object.values(DEPT_MANAGERS).forEach(arr => arr.forEach(m => names.add(m.name)));
      } else {
        expenses.forEach(e => {
          const lms = getLM(e.users?.department);
          if (lms) lms.forEach(m => names.add(m.name));
        });
      }

      sel.innerHTML = '<option value="">All Managers</option>';
      [...names].sort().forEach(managerName => {
        const opt = document.createElement('option');
        opt.value = managerName;
        opt.textContent = `👔 ${managerName}`;
        if (managerName === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // ─── Boot ─────────────────────────────────────────────────
    (async () => {
      const user = await requireAuth();
      if (!user) return;

      const profile = await getUserProfile();
      if (!profile) {
        showMessage('Could not load your profile. Please log in again.', 'error');
        setTimeout(logout, 2000);
        return;
      }

      currentProfile = profile;
      populateSidebar(profile);
      initTheme();
      enforcePasswordChange(profile);

      // Load live line manager data from Supabase (cached in sessionStorage).
      // Wrapped in try/catch — a missing function or failed API must never
      // block the dashboard from rendering.
      try {
        const liveManagers = await fetchLineManagers();
        if (liveManagers && typeof liveManagers === 'object') DEPT_MANAGERS = liveManagers;
      } catch (_) { /* use hardcoded DEPT_MANAGERS fallback */ }

      if (profile.role === 'admin' || profile.role === 'super_admin') {
        const titleSuffix = profile.role === 'admin' && profile.department ? ` · ${profile.department}` : '';
        document.getElementById('topbar-title').textContent =
          profile.role === 'super_admin' ? 'Super Admin Panel' : `Manager Dashboard${titleSuffix}`;
        renderAdminDashboard();
      } else {
        document.getElementById('topbar-title').textContent = 'My Expenses';
        renderEmployeeDashboard();
      }

      setupRealtime();
    })();

    // ─── REAL-TIME ──────────────────────────────────────────────
    let _rtDebounce = null;

    function setupRealtime() {
      db.channel('rt-dashboard-expenses')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, () => {
          clearTimeout(_rtDebounce);
          _rtDebounce = setTimeout(async () => {
            const isAdmin = currentProfile.role === 'admin' || currentProfile.role === 'super_admin';
            try {
              if (isAdmin) {
                const companyId = currentProfile.role !== 'super_admin' ? (currentProfile.company_id || undefined) : undefined;
                const limit = currentProfile.role === 'super_admin' ? 5000 : 1000;
                const expenses = deptFilter(await fetchExpenses({ companyId, limit }));
                allExpensesFetched = expenses;
                updateAdminStats(expenses);
                refreshListView();
                if (hierarchyMode) renderHierarchyView(expenses);
                renderAdminCharts(expenses);
              } else {
                const expenses = await fetchExpenses({ userId: currentProfile.id });
                allExpensesFetched = expenses;
                updateEmpStats(expenses);
                refreshListView();
              }
            } catch (_) {}
          }, 700);
        })
        .subscribe();
    }

    // ─── EMPLOYEE VIEW ──────────────────────────────────────────
    function renderEmployeeDashboard() {
      // Add "Add Expense" button to topbar on mobile
      document.getElementById('topbar-right').innerHTML =
        `<a href="add-expense.html" class="btn btn-primary btn-sm" style="border-radius:12px; padding: 0.6rem 1.25rem; font-weight:700">
         <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;margin-right:4px">
           <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
         </svg> Add
       </a>`;

      document.getElementById('main-content').innerHTML = `
      <!-- Premium Header -->
      <div style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); margin: -2rem -2rem 2rem -2rem; padding: 3rem 2rem 5rem 2rem; border-radius: 0 0 40px 40px; color: white;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 style="font-size: 2.25rem; font-weight: 800; margin: 0; letter-spacing: -0.025em;">My Dashboard</h1>
            <p style="opacity: 0.8; margin-top: 0.5rem; font-size: 1rem;">Track and manage your submitted expenses</p>
          </div>
          <a href="add-expense.html" class="btn btn-primary hide-mobile" style="background: white; color: #312e81; border: none; font-weight: 800; padding: 1rem 2rem; border-radius: 14px;">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;margin-right:8px">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Submit New Expense
          </a>
        </div>
      </div>

      <!-- Stats Grid -->
      <div style="max-width: 1200px; margin: -4rem auto 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
        <div class="stat-card" style="background: white; border-radius: 20px; padding: 1.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 1.5rem; border: 1px solid rgba(0,0,0,0.03);">
          <div style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); color: #6366f1; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem;">📋</div>
          <div>
            <div style="font-size: 0.75rem; color: #6b7280; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Total Records</div>
            <div class="stat-value" id="s-count" style="font-size: 1.75rem; font-weight: 800; color: #111827; margin-top: 2px;">—</div>
          </div>
        </div>
        <div class="stat-card" style="background: white; border-radius: 20px; padding: 1.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 1.5rem; border: 1px solid rgba(0,0,0,0.03);">
          <div style="width: 60px; height: 60px; background: rgba(139, 92, 246, 0.1); color: #8b5cf6; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem;">💰</div>
          <div>
            <div style="font-size: 0.75rem; color: #6b7280; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Total Amount</div>
            <div class="stat-value" id="s-total" style="font-size: 1.75rem; font-weight: 800; color: #111827; margin-top: 2px;">—</div>
          </div>
        </div>
        <div class="stat-card" style="background: white; border-radius: 20px; padding: 1.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 1.5rem; border: 1px solid rgba(0,0,0,0.03);">
          <div style="width: 60px; height: 60px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem;">📅</div>
          <div>
            <div style="font-size: 0.75rem; color: #6b7280; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Current Month</div>
            <div class="stat-value" id="s-month" style="font-size: 1.75rem; font-weight: 800; color: #111827; margin-top: 2px;">—</div>
          </div>
        </div>
      </div>

      <div style="max-width: 1200px; margin: 0 auto; padding: 0 1rem;">
        <!-- Filter Tabs -->
        <div class="filter-tabs p-2 mb-4" style="background: #f1f5f9; border-radius: 12px; display: flex; gap: 0.25rem; overflow-x: auto;">
          <button class="filter-tab active" id="btn-f-all" onclick="setListFilter('all')" style="padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; flex: 1; min-width: 80px;">All</button>
          <button class="filter-tab" id="btn-f-approved" onclick="setListFilter('approved')" style="padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; flex: 1; min-width: 80px;">Approved</button>
          <button class="filter-tab" id="btn-f-pending" onclick="setListFilter('pending')" style="padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; flex: 1; min-width: 80px;">Pending</button>
          <button class="filter-tab" id="btn-f-rejected" onclick="setListFilter('rejected')" style="padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; flex: 1; min-width: 80px;">Rejected</button>
        </div>

        <!-- Desktop table -->
        <div class="show-desktop">
          <div id="emp-table" style="background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); border: 1px solid var(--border); overflow: hidden;">
            <div class="loading-state"><div class="spinner"></div><span>Fetching expenses…</span></div>
          </div>
        </div>

        <!-- Mobile cards -->

    function extractSite(e) {
      const parts = (e.description || '').split('|');
      const type  = parts[0];
      if (['TRAVEL','TRAVEL_BUS','TRAVEL_TAXI','TRAVEL_TRAIN','TRAVEL_FLIGHT'].includes(type)) return parts[3] || '';
      if (type === 'TRAVEL_BIKE') return parts[4] || '';
      if (['FOOD','REGULAR','ROOM_RENT','BUS','TAXI','BIKE'].includes(type)) return parts[1] || '';
      if (type === 'OTHER') return parts[2] || '';
      return e.users?.site_name || '';
    }

    async function loadAdminExpenses(from, to) {

    function updateAdminStats(expenses) {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const effAmt = e => e.approved_amount != null ? +e.approved_amount : +e.amount;

      const active = expenses.filter(e => e.status !== 'rejected' && e.status !== 'l1_rejected');
      const todayTotal = active
        .filter(e => e.created_at.startsWith(today))
        .reduce((s, e) => s + effAmt(e), 0);
      const monthTotal = active
        .filter(e => { const d = new Date(e.created_at); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); })
        .reduce((s, e) => s + effAmt(e), 0);
      const allTotal = active.reduce((s, e) => s + effAmt(e), 0);

      document.getElementById('s-today').textContent = formatCurrency(todayTotal);
      document.getElementById('s-month').textContent = formatCurrency(monthTotal);
      document.getElementById('s-count').textContent = expenses.length;
      document.getElementById('s-total').textContent = formatCurrency(allTotal);

      // Super Admin — extra stat cards
      if (currentProfile.role === 'super_admin') {
        const uniqueEmps   = new Set(expenses.map(e => e.user_id)).size;
        const pendingAct   = expenses.filter(e => e.status === 'pending' || e.status === 'l1_approved').length;
        const approvedAmt  = expenses.filter(e => e.status === 'approved')
          .reduce((s, e) => s + (e.approved_amount != null ? +e.approved_amount : +e.amount), 0);
        const activeDepts  = new Set(expenses.map(e => e.users?.department).filter(Boolean)).size;
        const el = id => document.getElementById(id);
        if (el('sa-emp'))     el('sa-emp').textContent     = uniqueEmps;
        if (el('sa-pending')) el('sa-pending').textContent = pendingAct;
        if (el('sa-approved'))el('sa-approved').textContent= formatCurrency(approvedAmt);
        if (el('sa-depts'))   el('sa-depts').textContent   = activeDepts;
      }
    }

    function renderAdminTable(expenses) {
      const el = document.getElementById('admin-table');
      if (!el) return; // Safety check

      if (!expenses.length) {
        el.innerHTML = emptyState('No expenses found', 'Try selecting a different filter.');
        return;
      }

      // Grouping logic: by user and cycle
      const groups = {};
      expenses.forEach(e => {
        const userId = e.user_id;
        const date = new Date(e.created_at);
        const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cycleNum = date.getDate() <= 15 ? 1 : 2;
        const cycleText = cycleNum === 1 ? "1st - 15th" : "16th - End";
        const groupKey = `${userId}_${monthYear}_${cycleNum}`;

        if (!groups[groupKey]) {
          groups[groupKey] = {
            user: e.users,
            monthYear,
            cycleText,
            totalAmount: 0,
            entries: [],
            days: new Set(),
            status: 'pending'
          };
        }
        groups[groupKey].entries.push(e);
        groups[groupKey].days.add(date.getDate());
      });

      // Compute correct group status and total after all entries are added
      Object.values(groups).forEach(g => {
        const statuses = g.entries.map(e => e.status);
        if (statuses.every(s => s === 'approved')) {
          g.status = 'approved';
        } else if (statuses.every(s => s === 'rejected' || s === 'l1_rejected')) {
          g.status = 'rejected';
        } else if (statuses.some(s => s === 'l1_approved' || s === 'approved')) {
          g.status = 'l1_approved';
        } else if (statuses.some(s => s === 'rejected' || s === 'l1_rejected')) {
          g.status = 'l1_rejected';
        } else {
          g.status = 'pending';
        }
        // Use approved_amount for total, exclude rejected
        g.totalAmount = g.entries.reduce((sum, e) => {
          if (e.status === 'rejected' || e.status === 'l1_rejected') return sum;
          return sum + (e.approved_amount != null ? +e.approved_amount : +e.amount);
        }, 0);
      });

      // Sort groups: group with the most recently created/updated entry first
      const sortedGroups = Object.values(groups).sort((a, b) => {
        const latestA = Math.max(...a.entries.map(e => new Date(e.created_at).getTime()));
        const latestB = Math.max(...b.entries.map(e => new Date(e.created_at).getTime()));
        return latestB - latestA;
      });
      // Sort entries within each group newest-first
      sortedGroups.forEach(g => g.entries.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)));

      const total = expenses.reduce((s, e) => {
        if (e.status === 'rejected' || e.status === 'l1_rejected') return s;
        return s + (e.approved_amount != null ? +e.approved_amount : +e.amount);
      }, 0);
      el.innerHTML = `
      <div class="table-card-header">
        <div>
          <span class="table-card-title">Expense Summaries</span>
          <span class="table-card-count">${sortedGroups.length} group${sortedGroups.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="table-header-total">
          Total: <strong>${formatCurrency(total)}</strong>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Employee Details</th>
              <th>Cycle Period</th>
              <th>Total Amount</th>
              <th>Days (Filled/Missing)</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${sortedGroups.map(g => {
        const year = new Date(g.entries[0].created_at).getFullYear();

      const el = document.getElementById(`details-${safeKey}`);
      el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
    }

    function renderAdminCards(expenses) {
      const el = document.getElementById('admin-cards');
      if (!el) return; // Safety check

      if (!expenses.length) {
        el.innerHTML = emptyState('No expenses found', 'Try selecting a different filter.');
        return;
      }
      const total = expenses.reduce((s, e) => s + +e.amount, 0);
      el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
        <span style="font-weight:700;font-size:.9375rem">All Expenses</span>
        <span style="font-size:.8125rem;color:var(--primary);font-weight:700">${formatCurrency(total)}</span>
      </div>

    async function applyCycleFilter() {
      const monthVal  = document.getElementById('f-month').value;
      const cyclePart = document.getElementById('f-cycle').value;
      const search    = document.getElementById('f-user-search')?.value.toLowerCase().trim() || '';

      let filtered = allExpensesFetched;

      if (monthVal) {
        const [yr, mo] = monthVal.split('-').map(Number);
        filtered = filtered.filter(e => {
          const d = new Date(e.created_at);
          return d.getFullYear() === yr && (d.getMonth() + 1) === mo;
        });
      }

      if (cyclePart !== 'all') {
        filtered = filtered.filter(e => {
          const day = new Date(e.created_at).getDate();
          if (cyclePart === '1st - 15th') return day >= 1 && day <= 15;
          if (cyclePart === '16th - End') return day >= 16;
          return true;
        });
      }

      // Save month+cycle filtered base so exports pick it up
      activeFilteredExpenses = (monthVal || cyclePart !== 'all') ? filtered : null;

      if (search) {
        filtered = filtered.filter(e =>
          (e.users?.email || '').toLowerCase().includes(search) ||
          (e.users?.name  || '').toLowerCase().includes(search)
        );

        if (monthVal && cyclePart !== 'all') {
          showCycleProgress(filtered, monthVal, cyclePart);
        } else {
          document.getElementById('cycle-progress-card').style.display = 'none';
        }
      } else {
        document.getElementById('cycle-progress-card').style.display = 'none';
      }

      refreshListViewWithCustom(filtered);
    }

    function showCycleProgress(expenses, monthVal, cyclePart) {
      const card = document.getElementById('cycle-progress-card');
      const summary = document.getElementById('progress-summary');
      const bar = document.getElementById('progress-bar-fill');
      const grid = document.getElementById('day-grid');

      card.style.display = 'block';

      const dateObj = new Date(monthVal);
      const year = dateObj.getFullYear();
      const month = dateObj.getMonth();

      let startDay, endDay;
      if (cyclePart === '1st - 15th') {
        startDay = 1; endDay = 15;
      } else {
        startDay = 16;
        endDay = new Date(year, month + 1, 0).getDate();
      }

      const totalDays = endDay - startDay + 1;
      const filledDays = new Set();

      expenses.forEach(e => {
        const d = new Date(e.created_at);
        if (d.getDate() >= startDay && d.getDate() <= endDay) {
          filledDays.add(d.getDate());
        }
      });

      const count = filledDays.size;
      const percent = (count / totalDays) * 100;

      summary.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center">
          <span style="font-size: 1.25rem; font-weight: 700;">${count} / ${totalDays} Days Filled</span>
          <span style="color: ${count === totalDays ? 'var(--green)' : 'var(--red)'}; font-weight: 600;">
            ${totalDays - count} Missing
          </span>
        </div>
      `;

      bar.style.width = `${percent}%`;
      bar.style.background = percent === 100 ? 'var(--green)' : 'var(--primary)';

      let gridHtml = '';
      for (let i = startDay; i <= endDay; i++) {
        const isFilled = filledDays.has(i);
        gridHtml += `
          <div style="
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            background: ${isFilled ? 'var(--green)' : 'var(--bg-3)'};
            color: ${isFilled ? '#fff' : 'var(--text-3)'};
            border: 1px solid ${isFilled ? 'transparent' : 'var(--border)'};
          " title="Day ${i}: ${isFilled ? 'Filled' : 'Missing'}">
            ${i}
          </div>
        `;
      }
      grid.innerHTML = gridHtml;
    }

    function autoUpdateCycleFilter() {
      applyCycleFilter();
    }

    function refreshListViewWithCustom(filteredData) {
      const search = document.getElementById('f-user-search')?.value.toLowerCase().trim() || '';
      let filtered = filteredData;

      if (currentListFilter !== 'all') {
        filtered = filtered.filter(e => e.status === currentListFilter);
      }

      const isAdmin = currentProfile.role === 'admin' || currentProfile.role === 'super_admin';

      if (search && isAdmin) {
        filtered = filtered.filter(e =>
          (e.users?.email || '').toLowerCase().includes(search) ||
          (e.users?.name  || '').toLowerCase().includes(search)
        );
      }

      const managerFilter = (document.getElementById('f-manager')?.value || '').trim();
      if (managerFilter && isAdmin) {
        filtered = filtered.filter(e => {
          const lms = getLM(e.users?.department);
          return lms && lms.some(m => m.name === managerFilter);
        });
      }

      if (isAdmin) filtered = applyDeptSelectFilter(filtered);

      if (isAdmin) {
        renderAdminTable(filtered);
        renderAdminCards(filtered);
      } else {
        renderEmpTable(filtered);
        renderEmpCards(filtered);
      }
    }

    async function clearFilter() {
      if (document.getElementById('f-month')) document.getElementById('f-month').value = '';
      if (document.getElementById('f-cycle')) document.getElementById('f-cycle').value = 'all';
      if (document.getElementById('f-user-search')) document.getElementById('f-user-search').value = '';
      if (document.getElementById('f-manager')) document.getElementById('f-manager').value = '';
      if (document.getElementById('f-dept'))    document.getElementById('f-dept').value = '';
      activeFilteredExpenses = null;
      const spin = `<div class="loading-state"><div class="spinner"></div><span>Loading…</span></div>`;
      document.getElementById('admin-table').innerHTML = spin;
      document.getElementById('admin-cards').innerHTML = spin;
      await loadAdminExpenses();
    }

    function setViewMode(mode) {
      hierarchyMode = mode === 'hierarchy';
      const hierView = document.getElementById('hier-view');
      const listWrap = document.getElementById('list-view-wrap');
      const hierBtn  = document.getElementById('btn-view-hier');
      const listBtn  = document.getElementById('btn-view-list');
      if (hierView) hierView.style.display = hierarchyMode ? 'block' : 'none';
      if (listWrap) listWrap.style.display = hierarchyMode ? 'none'  : 'block';
      if (hierBtn)  { hierBtn.className  = hierarchyMode ? 'btn btn-primary btn-sm'   : 'btn btn-secondary btn-sm'; hierBtn.style.borderRadius='8px'; }
      if (listBtn)  { listBtn.className  = hierarchyMode ? 'btn btn-secondary btn-sm' : 'btn btn-primary btn-sm';   listBtn.style.borderRadius='8px'; }
      if (hierarchyMode) {
        renderHierarchyView(allExpensesFetched);
      } else {
        refreshListView();
        renderAdminCharts(allExpensesFetched);
      }
    }

      return `<a class="receipt-link" href="javascript:void(0)" onclick="viewExpenseReceipts('${escHtml(e.receipt_url)}')">${lbl}</a>`;
    }

    function receiptCardFooter(e, label = 'View Receipt') {
      const urls = parseReceiptUrls(e.receipt_url);
      if (!urls.length) return '';
      const lbl = urls.length > 1 ? `View ${urls.length} Receipts` : label;
      return `<div class="expense-card-footer"><a class="receipt-link" href="javascript:void(0)" onclick="viewExpenseReceipts('${escHtml(e.receipt_url)}')">📎 ${lbl}</a></div>`;
    }

    function parseDescForDisplay(raw) {
      if (!raw) return '—';
      const p = raw.split('|');
      const type = p[0];

      const TRAVEL_ICONS = { TRAVEL_BUS: '🚌 Bus', TRAVEL_TAXI: '🚕 Taxi', TRAVEL_TRAIN: '🚆 Train', TRAVEL_FLIGHT: '✈️ Flight' };
      const TRAVEL_COLORS = { TRAVEL_BUS: '#0369a1', TRAVEL_TAXI: '#b45309', TRAVEL_TRAIN: '#6d28d9', TRAVEL_FLIGHT: '#92400e' };
      if (TRAVEL_ICONS[type]) {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:${TRAVEL_COLORS[type]};text-transform:uppercase">${TRAVEL_ICONS[type]}</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'TRAVEL_BIKE') {
        const km = escHtml(p[1]||''), from = escHtml(p[2]||''), to = escHtml(p[3]||''), site = escHtml(p[4]||''), desc = escHtml(p[5]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#059669;text-transform:uppercase">🏍️ Bike</span>`,
          km ? `${km} km` : '',
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'FOOD') {
        const site = escHtml(p[1]||''), desc = escHtml(p[2]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#15803d;text-transform:uppercase">🍽️ Food</span>`,
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      // Legacy formats
      if (type === 'TRAVEL') {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:var(--primary);text-transform:uppercase">🚌 Bus</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'BUS') {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#0369a1;text-transform:uppercase">🚌 Bus</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'TAXI') {
        const from = escHtml(p[1]||''), to = escHtml(p[2]||''), site = escHtml(p[3]||''), desc = escHtml(p[4]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#b45309;text-transform:uppercase">🚕 Taxi</span>`,
          from && to ? `${from} → ${to}` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'BIKE') {
        const km = escHtml(p[1]||''), site = escHtml(p[2]||''), desc = escHtml(p[3]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#059669;text-transform:uppercase">🏍️ Bike</span>`,
          km ? `${km} km` : '',
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
      }
      if (type === 'OTHER') {
        const name = escHtml(p[1]||''), site = escHtml(p[2]||''), desc = escHtml(p[3]||'');
        return [name ? `<strong>${name}</strong>` : '', site ? `📍 ${site}` : '', desc].filter(Boolean).join(' ');
      }
      if (type === 'ROOM_RENT') {
        const site = escHtml(p[1]||''), desc = escHtml(p[2]||'');
        return [
          `<span style="font-size:.7rem;font-weight:700;color:#7c3aed;text-transform:uppercase">🏠 Room Rent</span>`,
          site ? `📍 ${site}` : '', desc,
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');

      if (type === 'REGULAR') {
        const site = escHtml(p[1]||''), desc = escHtml(p[2]||'');
        return [site ? `📍 ${site}` : '', desc].filter(Boolean).join(' · ') || '—';
      }
      return escHtml(raw);

    async function submitApprovalAction(action) {
      const expenseId = document.getElementById('am-expense-id').value;
      const approvedAmount = parseFloat(document.getElementById('am-amount').value);
      const remark = document.getElementById('am-remark').value.trim();
      const e = allExpensesFetched.find(x => x.id === expenseId);
      if (!e) return;

      if (action === 'rejected' && !remark) {
        showMessage('A remark is required when rejecting.', 'error');
        return;
      }
      const amtChanged = !isNaN(approvedAmount) && approvedAmount !== +e.amount;
      if (amtChanged && !remark) {
        showMessage('A remark is required when changing the approved amount.', 'error');
        return;
      }

      const btnId = action === 'approved' ? 'am-approve-btn' : 'am-reject-btn';
      const btn = document.getElementById(btnId);
      setLoading(btn, true);

      try {
        const { data: { session } } = await db.auth.getSession();
        const token = session?.access_token;
        if (!token) throw new Error('Not authenticated');

        const payload = { expense_id: expenseId, action, remark: remark || null };
        if (amtChanged) payload.approved_amount = approvedAmount;

        const res = await fetch('/api/approve-expense', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { throw new Error('Server error: ' + text.substring(0, 120)); }
        if (!res.ok) throw new Error(data.error || 'Approval failed');

        showMessage(`Expense ${action === 'approved' ? 'approved' : 'rejected'} successfully!`, 'success');
        closeApprovalModal();
        await loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    async function approveEntireCycle(safeKey) {
      const [userId, monthYear, cycleText] = safeKey.split('|');
      const isL1 = currentProfile.role === 'admin';
      const isL2 = currentProfile.role === 'super_admin';

      const toApprove = allExpensesFetched.filter(e => {
        const date = new Date(e.created_at);
        const mY = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cNum = date.getDate() <= 15 ? 1 : 2;
        const cT = cNum === 1 ? "1st - 15th" : "16th - End";
        if (!(e.user_id === userId && mY === monthYear && cT === cycleText)) return false;
        if (isL1) return e.status === 'pending';
        if (isL2) return e.status === 'pending' || e.status === 'l1_approved';
        return false;
      });

      if (!toApprove.length) {
        showMessage('No eligible expenses to approve in this cycle.', 'info');
        return;
      }

      if (!confirm(`Approve all ${toApprove.length} expenses in this cycle?`)) return;

      try {
        const { data: { session } } = await db.auth.getSession();
        const token = session?.access_token;
        if (!token) throw new Error('Not authenticated');

        let successCount = 0;
        for (const e of toApprove) {
          const res = await fetch('/api/approve-expense', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ expense_id: e.id, action: 'approved', remark: 'Bulk cycle approval' })
          });
          if (res.ok) successCount++;
        }

        showMessage(`Successfully approved ${successCount} of ${toApprove.length} expenses!`, 'success');
        await loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

      await updateExpenseStatus(id, 'rejected', reason.trim());

    async function updateExpenseStatus(id, status, reason = null) {
      try {
        const updateData = { status };
        if (reason) updateData.rejection_reason = reason;

        const { error } = await db
          .from('expenses')
          .update(updateData)
          .eq('id', id);

        if (error) throw error;

        // Send notification
        const expense = allExpensesFetched.find(e => e.id === id);
        if (expense && expense.users?.email) {
          notifyUser(expense.users.email, status, reason);
        }

        showMessage(`Expense ${status} successfully.`, 'success');

        // Reload admin expenses to update the view
        const from = document.getElementById('f-from')?.value || undefined;
        const to = document.getElementById('f-to')?.value || undefined;
        await loadAdminExpenses(from, to);
      } catch (err) {
        showMessage(err.message || 'Failed to update status.', 'error');
      }
    }

    /** Unified helper to trigger a browser download with a specific filename */
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 100);
      showMessage(`Download started: ${filename} 📊`, 'success');
    }

    /** Internal helper to perform Excel generation from a list of expenses */
    function performExcelExport(expenses, filename = 'Export.xlsx') {
      if (typeof XLSX === 'undefined') {
        return showMessage('Excel library not loaded. Please refresh and try again.', 'error');
      }
      if (!expenses.length) return showMessage('No data to export', 'error');

      const safeFilename = filename.replace(/[^a-z0-9.]/gi, '_');
      if (!safeFilename.endsWith('.xlsx')) filename += '.xlsx';

      // Sort oldest → newest before writing rows
      const sorted = [...expenses].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

      // Define clear headers
      const headers = [
        "Date", "Cycle", "Submitted At", "Name", "Emp No", "Mobile",
        "Department", "Site", "Category", "From (Travel)", "To (Travel)",
        "Description", "Submitted Amount", "Approved Amount", "Status",
        "Bank Holder", "Bank Name", "Bank IFSC", "Bank Account",
        "L1 Approver", "L1 Date", "L1 Remark",
        "L2 Approver", "L2 Date", "L2 Remark", "Admin Comment"
      ];

      // Map data to rows
      const rows = sorted.map(e => {
        const u = e.users || {};
        const parts = (e.description || '').split('|');
        const type = parts[0];
        let d = e.description, f = '', t = '';
        if (type === 'TRAVEL') { f = parts[1]; t = parts[2]; d = parts[4]; }
        else if (['TRAVEL_BUS','TRAVEL_TAXI','TRAVEL_TRAIN','TRAVEL_FLIGHT'].includes(type)) { f = parts[1]; t = parts[2]; d = parts[4]; }
        else if (type === 'TRAVEL_BIKE') { d = parts[5]; }
        else if (type === 'OTHER') { d = `(${parts[1]}) ${parts[3]}`; }
        else if (type === 'REGULAR') { d = parts[2]; }
        else if (type === 'FOOD') { d = parts[2]; }
        else if (type === 'ROOM_RENT') { d = parts[2]; }
        const s = extractSite(e) || u.site_name || '';

        const date = new Date(e.created_at);
        const cycle = date.getDate() <= 15 ? "1st - 15th" : "16th - End";
        const approvedAmt = e.approved_amount != null ? e.approved_amount : e.amount;
        const bankAcct = u.bank_account ? '****' + u.bank_account.slice(-4) : '';

        return [
          formatDate(e.created_at), cycle, formatDateTime(e.created_at),
          u.name || '', u.emp_no || '', u.phone || '', u.department || '',
          s, e.category, f, t, d, e.amount, approvedAmt, e.status,
          u.bank_holder || '', u.bank_name || '', u.bank_ifsc || '', bankAcct,
          e.l1_by_name || '', e.l1_at ? formatDateTime(e.l1_at) : '', e.l1_remark || '',
          e.l2_by_name || '', e.l2_at ? formatDateTime(e.l2_at) : '', e.l2_remark || '',
          e.rejection_reason || ''
        ];
      });

      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

      // ── Site Summary sheet ─────────────────────────────────
      const siteMap = {};
      sorted.forEach(e => {
        if (e.status === 'rejected' || e.status === 'l1_rejected') return;
        const u = e.users || {};
        const empKey = (u.name || u.email || e.user_id);
        const site   = extractSite(e) || u.site_name || 'Unassigned';
        const amt    = e.approved_amount != null ? +e.approved_amount : +e.amount;
        if (!siteMap[empKey]) siteMap[empKey] = { name: u.name || '', emp_no: u.emp_no || '', dept: u.department || '', sites: {} };
        if (!siteMap[empKey].sites[site]) siteMap[empKey].sites[site] = { total: 0, days: new Set(), count: 0 };
        siteMap[empKey].sites[site].total += amt;
        siteMap[empKey].sites[site].days.add(new Date(e.created_at).toDateString());
        siteMap[empKey].sites[site].count++;
      });

      const siteHeaders = ['Employee', 'Emp No', 'Department', 'Site', 'Visits', 'Days Worked', 'Total Amount'];
      const siteRows = [];
      Object.values(siteMap).forEach(emp => {
        let empTotal = 0;
        Object.entries(emp.sites).sort(([a],[b]) => a.localeCompare(b)).forEach(([site, data]) => {
          siteRows.push([emp.name, emp.emp_no, emp.dept, site, data.count, data.days.size, data.total]);
          empTotal += data.total;
        });
        siteRows.push(['', '', '', `TOTAL — ${emp.name}`, '', '', empTotal]);
        siteRows.push([]);
      });

      const wsSite = XLSX.utils.aoa_to_sheet([siteHeaders, ...siteRows]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Expenses");
      XLSX.utils.book_append_sheet(wb, wsSite, "Site Summary");

      try {
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        triggerDownload(blob, safeFilename.endsWith('.xlsx') ? safeFilename : safeFilename + '.xlsx');
      } catch (err) {
        console.error('Excel Export Error:', err);
        showMessage('Failed to generate Excel file.', 'error');
      }
    }

    /** Export a specific user's specific cycle */
    function exportCycleToExcel(safeKey) {
      const [userId, monthYear, cycleText] = safeKey.split('|');
      const filtered = allExpensesFetched.filter(e => {
        const date = new Date(e.created_at);
        const mY = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cNum = date.getDate() <= 15 ? 1 : 2;
        const cT = cNum === 1 ? "1st - 15th" : "16th - End";
        return e.user_id === userId && mY === monthYear && cT === cycleText;
      });

      const name = filtered[0]?.users?.name || 'User';
      performExcelExport(filtered, `ExpenseReport_${name}_${monthYear}_${cycleText}.xlsx`);
    }

    /** Export all data for the currently selected month in the filter */
    function exportMonthToExcel() {
      const monthVal = document.getElementById('f-month').value;
      if (!monthVal) return showMessage('Please select a month first to use Month Export.', 'error');

      const [yr, mo] = monthVal.split('-').map(Number);
      // Start from current export data (respects status/search/manager filters) then narrow to month
      const base = getExportData();
      const filtered = base.filter(e => {
        const d = new Date(e.created_at);
        return d.getFullYear() === yr && (d.getMonth() + 1) === mo;
      });
      const monthName = new Date(monthVal).toLocaleString('default', { month: 'long', year: 'numeric' });
      performExcelExport(filtered, `ExpenseReport_FullMonth_${monthName}.xlsx`);
    }

    // ─── CSV EXPORT (ULTRA ROBUST) ──────────────────────────────

    function performCSVExport(expenses, filename = 'Export.csv') {
      if (!expenses.length) return showMessage('No data to export', 'error');
      const safeFilename = filename.replace(/[^a-z0-9.]/gi, '_');
      const finalFilename = safeFilename.endsWith('.csv') ? safeFilename : safeFilename + '.csv';

      // Sort oldest → newest before writing rows
      const sorted = [...expenses].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

      const headers = [
        "Date", "Cycle", "Submitted At", "Name", "Emp No", "Mobile",
        "Department", "Site", "Category", "From", "To",
        "Description", "Submitted Amount", "Approved Amount", "Status",
        "Bank Holder", "Bank Name", "Bank IFSC", "Bank Account",
        "L1 Approver", "L1 Date", "L1 Remark",
        "L2 Approver", "L2 Date", "L2 Remark", "Admin Comment"
      ];

      const rows = sorted.map(e => {
        const u = e.users || {};
        const parts = (e.description || '').split('|');
        const type = parts[0];
        let d = e.description, f = '', t = '';
        if (type === 'TRAVEL') { f = parts[1]; t = parts[2]; d = parts[4]; }
        else if (['TRAVEL_BUS','TRAVEL_TAXI','TRAVEL_TRAIN','TRAVEL_FLIGHT'].includes(type)) { f = parts[1]; t = parts[2]; d = parts[4]; }
        else if (type === 'TRAVEL_BIKE') { d = parts[5]; }
        else if (type === 'OTHER') { d = `(${parts[1]}) ${parts[3]}`; }
        else if (type === 'REGULAR') { d = parts[2]; }
        else if (type === 'FOOD') { d = parts[2]; }
        else if (type === 'ROOM_RENT') { d = parts[2]; }
        const s = extractSite(e) || u.site_name || '';
        const date = new Date(e.created_at);
        const cycle = date.getDate() <= 15 ? "1st - 15th" : "16th - End";
        const approvedAmt = e.approved_amount != null ? e.approved_amount : e.amount;
        const bankAcct = u.bank_account ? '****' + u.bank_account.slice(-4) : '';
        const clean = str => `"${String(str || '').replace(/"/g, '""')}"`;
        return [
          formatDate(e.created_at), cycle, formatDateTime(e.created_at),
          u.name || '', u.emp_no || '', u.phone || '', u.department || '',
          s, e.category, f, t, d, e.amount, approvedAmt, e.status,
          u.bank_holder || '', u.bank_name || '', u.bank_ifsc || '', bankAcct,
          e.l1_by_name || '', e.l1_at ? formatDateTime(e.l1_at) : '', e.l1_remark || '',
          e.l2_by_name || '', e.l2_at ? formatDateTime(e.l2_at) : '', e.l2_remark || '',
          e.rejection_reason || ''
        ].map(clean).join(',');
      });

      const csvContent = headers.join(',') + "\n" + rows.join('\n');
      const blob = new Blob(['﻿' + csvContent], { type: 'text/csv;charset=utf-8;' });
      triggerDownload(blob, finalFilename);
    }

      performCSVExport(filtered, `ExpenseReport_${ts}.csv`);

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');

    }

    function updateThemeUI(isDark) {
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-text').textContent = isDark ? 'Light Mode' : 'Dark Mode';

    function toggleAllCheckboxes(master) {
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.checked = master.checked;
      });
      updateBulkBar();
    }

    function updateBulkBar() {
      const checked = document.querySelectorAll('.row-checkbox:checked');
      const bar = document.getElementById('bulk-bar');
      const text = document.getElementById('bulk-count-text');

      if (checked.length > 0) {
        bar.classList.add('active');
        text.textContent = `${checked.length} item${checked.length > 1 ? 's' : ''} selected`;
      } else {
        bar.classList.remove('active');
      }
    }

    async function bulkStatusUpdate(status) {
      const checked = document.querySelectorAll('.row-checkbox:checked');
      const ids = Array.from(checked).map(cb => cb.value);

      let reason = null;
      if (status === 'rejected') {
        reason = prompt("Please enter a reason for rejection (applied to all selected):");
        if (reason === null) return;
      }

      if (!confirm(`Are you sure you want to ${status} ${ids.length} expenses?`)) return;

      try {
        const { error } = await db
          .from('expenses')
          .update({ status, rejection_reason: reason })
          .in('id', ids);

        if (error) throw error;

        showMessage(`Successfully ${status} ${ids.length} items.`, 'success');
        document.getElementById('select-all').checked = false;
        updateBulkBar();
        loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    // ── HIERARCHY VIEW ────────────────────────────────────────

    function buildHierarchyTree(expenses) {
      const tree = {};
      expenses.forEach(e => {
        const dept = (e.users?.department || '').trim() || 'Unassigned';
        if (!tree[dept]) tree[dept] = { dept, managers: {} };
        const lms = getLM(dept);
        const addEmp = (mgrKey, mgr) => {
          if (!tree[dept].managers[mgrKey]) tree[dept].managers[mgrKey] = { mgr, employees: {} };
          const uid = e.user_id;
          if (!tree[dept].managers[mgrKey].employees[uid])
            tree[dept].managers[mgrKey].employees[uid] = { user: e.users, expenses: [] };
          tree[dept].managers[mgrKey].employees[uid].expenses.push(e);
        };
        if (lms && lms.length) lms.forEach(m => addEmp(m.code, m));
        else addEmp('__no_mgr__', null);
      });
      return tree;
    }

          ${[['Holder',user.bank_holder],['Bank',user.bank_name],['IFSC',user.bank_ifsc],
             ['Acct No',user.bank_account?'****'+user.bank_account.slice(-4):null]
            ].map(([l,v])=>v?`<div><div style="font-size:.6rem;text-transform:uppercase;font-weight:700;color:#3b82f6;margin-bottom:2px">${l}</div><div style="font-weight:700;color:#1e3a8a">${escHtml(String(v))}</div></div>`:'').filter(Boolean).join('')}
        </div>` : ''}
        <!-- Site-wise summary -->
        ${(()=>{
          const siteData = {};
          expenses.forEach(e => {
            if (e.status === 'rejected' || e.status === 'l1_rejected') return;
            const site = extractSite(e) || user.site_name || 'Unassigned';
            const amt  = e.approved_amount != null ? +e.approved_amount : +e.amount;
            if (!siteData[site]) siteData[site] = { total: 0, days: new Set(), count: 0 };
            siteData[site].total += amt;
            siteData[site].days.add(new Date(e.created_at).toDateString());
            siteData[site].count++;
          });
          const sites = Object.entries(siteData).sort(([a],[b]) => a.localeCompare(b));
          if (!sites.length) return '';
          const overallTotal = sites.reduce((s,[,d]) => s + d.total, 0);
          return `
          <div style="border:1px solid #e0e7ff;border-radius:10px;overflow:hidden;margin-bottom:.75rem">
            <div style="background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center">
              <span style="color:#fff;font-weight:700;font-size:.8rem">📍 Site-wise Summary</span>
              <span style="color:rgba(255,255,255,.85);font-size:.75rem;font-weight:600">Overall: ${formatCurrency(overallTotal)}</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem;padding:.75rem;background:#f5f3ff">
              ${sites.map(([site, d]) => `
              <div style="background:#fff;border:1px solid #c4b5fd;border-radius:8px;padding:.6rem .75rem">
                <div style="font-size:.72rem;font-weight:700;color:#5b21b6;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escHtml(site)}">📍 ${escHtml(site)}</div>
                <div style="font-size:1rem;font-weight:800;color:#4f46e5">${formatCurrency(d.total)}</div>
                <div style="font-size:.65rem;color:#7c3aed;margin-top:.15rem">${d.count} entries · ${d.days.size} day${d.days.size!==1?'s':''}</div>
              </div>`).join('')}
            </div>
          </div>`;
        })()}
        <!-- Cycle groups -->
        ${sorted.map(g => {
          const safeKey = `${user.id}|${g.mY}|${g.cT}`;
          const gTotal = g.entries.reduce((s,e)=>{
            if(e.status==='rejected'||e.status==='l1_rejected') return s;
            return s+(e.approved_amount!=null?+e.approved_amount:+e.amount);
          },0);
          return `
          <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.625rem;background:var(--card-bg,#fff)">
            <div style="padding:.625rem 1rem;background:var(--bg-page,#f9fafb);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
              <div>
                <span style="font-weight:700;font-size:.85rem">${escHtml(g.mY)}</span>
                <span style="background:var(--primary);color:white;border-radius:5px;padding:0 7px;font-size:.68rem;font-weight:700;margin-left:.4rem">${escHtml(g.cT)}</span>
                <span style="font-size:.72rem;color:var(--text-muted);margin-left:.5rem">${g.entries.length} entries · ${formatCurrency(gTotal)}</span>
              </div>
              <div style="display:flex;gap:.3rem;flex-wrap:wrap">
                <button class="btn btn-primary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px" onclick="approveEntireCycle('${safeKey}')">✓ Approve Cycle</button>
                <button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px" onclick="exportCycleToExcel('${safeKey}')">Excel</button>
                <button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px;background:#0f172a;color:white;border:none" onclick="exportCycleToCSV('${safeKey}')">CSV</button>
              </div>
            </div>
            <div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;font-size:.8rem">
                <thead>
                  <tr style="background:var(--bg-page,#f9fafb)">
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;font-weight:700">Date</th>
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Category</th>
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Description</th>
                    <th style="padding:.5rem .75rem;text-align:right;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;white-space:nowrap">Amount</th>
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Status</th>
                    <th style="padding:.5rem .75rem;text-align:right;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${g.entries.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).map(e => {
                    const apAmt = e.approved_amount!=null?e.approved_amount:e.amount;
                    const changed = e.approved_amount!=null && +e.approved_amount!==+e.amount;
                    const showL1 = currentProfile.role==='admin' && e.status==='pending';
                    const showL2 = currentProfile.role==='super_admin' && e.status==='l1_approved';
                    const showDir= currentProfile.role==='super_admin' && e.status==='pending';
                    return `
                    <tr style="border-top:1px solid var(--border)">
                      <td style="padding:.5rem .75rem;white-space:nowrap;color:var(--text-muted)">${new Date(e.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</td>
                      <td style="padding:.5rem .75rem">${catPill(e.category)}</td>
                      <td style="padding:.5rem .75rem;max-width:220px">
                        <div>${parseDescForDisplay(e.description)}</div>
                        ${e.rejection_reason?`<div style="font-size:.7rem;color:#dc2626;margin-top:.2rem">💬 ${escHtml(e.rejection_reason)}</div>`:''}
                        ${e.l1_remark?`<div style="font-size:.68rem;color:#3b82f6;margin-top:.15rem">L1: ${escHtml(e.l1_remark)}</div>`:''}
                        ${e.l2_remark?`<div style="font-size:.68rem;color:#16a34a;margin-top:.15rem">L2: ${escHtml(e.l2_remark)}</div>`:''}
                      </td>
                      <td style="padding:.5rem .75rem;text-align:right;white-space:nowrap">
                        ${changed?`<div style="text-decoration:line-through;color:var(--text-muted);font-size:.7rem">${formatCurrency(e.amount)}</div>`:''}
                        <div style="font-weight:700;color:var(--primary)">${formatCurrency(apAmt)}</div>
                      </td>
                      <td style="padding:.5rem .75rem">
                        ${approvalStepper(e)}
                        ${e.l1_by_name?`<div style="font-size:.62rem;color:var(--text-muted);margin-top:.2rem">L1: ${escHtml(e.l1_by_name)}</div>`:''}
                        ${e.l2_by_name?`<div style="font-size:.62rem;color:var(--text-muted)">L2: ${escHtml(e.l2_by_name)}</div>`:''}
                        ${parseReceiptUrls(e.receipt_url).length?`<a href="javascript:void(0)" onclick="viewExpenseReceipts('${escHtml(e.receipt_url)}')" style="font-size:.68rem;color:var(--primary);font-weight:600">📎 ${parseReceiptUrls(e.receipt_url).length>1?parseReceiptUrls(e.receipt_url).length+' Receipts':'Receipt'}</a>`:''}
                      </td>
                      <td style="padding:.5rem .75rem;text-align:right">
                        <div style="display:flex;gap:.2rem;justify-content:flex-end;flex-wrap:wrap">
                          <button class="btn btn-secondary btn-sm" style="padding:.18rem .4rem;font-size:.7rem" onclick="openCommentModal('${e.id}')">💬</button>
                          ${showL1?`<button class="btn btn-primary btn-sm" style="padding:.18rem .4rem;font-size:.7rem" onclick="openApprovalModal('${e.id}')">L1</button>`:''}
                          ${showL2?`<button class="btn btn-primary btn-sm" style="padding:.18rem .4rem;font-size:.7rem;background:#7c3aed" onclick="openApprovalModal('${e.id}')">L2</button>`:''}
                          ${showDir?`<button class="btn btn-secondary btn-sm" style="padding:.18rem .4rem;font-size:.7rem" onclick="openApprovalModal('${e.id}')">↑</button>`:''}
                          <button class="btn btn-secondary btn-sm" style="padding:.18rem .4rem;font-size:.7rem;color:#dc2626" onclick="deleteExpense('${e.id}')">🗑️</button>
                        </div>
                      </td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    function hierToggleDept(nodeId, dept) {
      const open = hierExpanded.depts.has(dept);
      if (open) hierExpanded.depts.delete(dept); else hierExpanded.depts.add(dept);
      const el = document.getElementById('hnode-' + nodeId);
      const ch = document.getElementById('chev-' + nodeId);
      if (el) el.style.display = open ? 'none' : 'block';
      if (ch) ch.style.transform = open ? '' : 'rotate(180deg)';
    }

    function hierToggleMgr(id) {
      const open = hierExpanded.mgrs.has(id);
      if (open) hierExpanded.mgrs.delete(id); else hierExpanded.mgrs.add(id);
      const el = document.getElementById('hnode-' + id);
      const ch = document.getElementById('chev-' + id);
      if (el) el.style.display = open ? 'none' : 'block';
      if (ch) ch.style.transform = open ? '' : 'rotate(180deg)';
    }

    function hierToggleEmp(id) {
      const open = hierExpanded.emps.has(id);
      if (open) hierExpanded.emps.delete(id); else hierExpanded.emps.add(id);
      const el = document.getElementById('hnode-' + id);
      const ch = document.getElementById('chev-' + id);
      if (el) el.style.display = open ? 'none' : 'block';
      if (ch) ch.style.transform = open ? '' : 'rotate(180deg)';
    }

    function hierExpandAll() {
      document.querySelectorAll('[id^="hnode-dept__"]').forEach(el => {
        el.style.display = 'block';
        hierExpanded.depts.add(el.id.replace('hnode-dept__','').replace(/_/g,' '));
      });
      document.querySelectorAll('[id^="chev-dept__"]').forEach(el => el.style.transform = 'rotate(180deg)');
      document.querySelectorAll('[id^="hnode-mgr__"]').forEach(el => {
        el.style.display = 'block';
        hierExpanded.mgrs.add(el.id.replace('hnode-',''));
      });
      document.querySelectorAll('[id^="chev-mgr__"]').forEach(el => el.style.transform = 'rotate(180deg)');
    }

    function hierCollapseAll() {
      hierExpanded.depts.clear(); hierExpanded.mgrs.clear(); hierExpanded.emps.clear();
      document.querySelectorAll('[id^="hnode-dept__"],[id^="hnode-mgr__"],[id^="hnode-emp__"]').forEach(el => el.style.display = 'none');
      document.querySelectorAll('[id^="chev-dept__"],[id^="chev-mgr__"],[id^="chev-emp__"]').forEach(el => el.style.transform = '');
    }
  </script>
</body>

</html>
