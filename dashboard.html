    async function downloadDeptPDF(opts = {}) {
      const jspdfLib = window.jspdf || window.jsPDF;
      if (!jspdfLib) return showMessage('PDF library not loaded. Please refresh and try again.', 'error');

      const btn = document.getElementById('btn-export-pdf') || { disabled: false, innerHTML: '' };
      const origHTML = btn.innerHTML;
      btn.disabled = true;

      // ── Persistent progress bar (visible even after tab switch) ──
      let overlay = document.getElementById('pdf-progress-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'pdf-progress-overlay';
        overlay.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:14px 20px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:99999;min-width:300px;max-width:90vw;font-family:system-ui,sans-serif;font-size:13px;display:flex;flex-direction:column;gap:8px;';
        document.body.appendChild(overlay);
      }
      if (!document.getElementById('_pdf_spin')) {
        const s = document.createElement('style');
        s.id = '_pdf_spin';
        s.textContent = '@keyframes _pdfSpin{to{transform:rotate(360deg)}}';
        document.head.appendChild(s);
      }
      function setProg(msg, pct) {
        document.title = `(${Math.round(pct)}%) Generating PDF…`;
        overlay.innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><svg style="width:16px;height:16px;flex-shrink:0;animation:_pdfSpin 1s linear infinite" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><span style="flex:1">${msg}</span><span style="color:#94a3b8;font-size:11px">${Math.round(pct)}%</span></div><div style="height:3px;background:#334155;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#6366f1,#a5b4fc);border-radius:2px;transition:width .25s ease"></div></div>`;
      }
      function doneProg(msg, isErr) {
        document.title = document.title.replace(/^\(\d+%\)\s*/, '');
        overlay.innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><span style="font-size:16px">${isErr ? '❌' : '✅'}</span><span>${msg}</span></div>`;
        setTimeout(() => overlay.remove(), 3500);
        btn.disabled = false; btn.innerHTML = origHTML;
      }

      try {
        setProg('Loading expenses…', 2);
        const expenses = opts.expenses || getExportData();
        if (!expenses.length) { doneProg('No data to export', true); return; }

        const token = (await db.auth.getSession()).data.session?.access_token;
        const { jsPDF } = jspdfLib;
        const dept = expenses[0]?.users?.department || 'All Departments';
        const monthVal = document.getElementById('f-month')?.value || '';
        const monthLabel = opts.monthLabel
          || (monthVal ? new Date(monthVal + '-01').toLocaleString('default', { month: 'long', year: 'numeric' }) : 'All');

        // ── Extract path from Supabase URL ──────────────────
        function extractPath(url) {
          const m = url.match(/\/storage\/v1\/object\/(?:public|sign)\/receipts\/(.+?)(?:\?|$)/);
          if (m) return m[1];
          const m2 = url.match(/receipts\/(.+?)(?:\?|$)/);
          return m2 ? m2[1] : null;
        }

        // ── Read EXIF orientation from raw JPEG bytes ────────
        function getExifOrientation(buf) {
          try {
            const v = new DataView(buf);
            if (v.getUint16(0) !== 0xFFD8) return 1;
            let off = 2;
            while (off < buf.byteLength - 4) {
              const marker = v.getUint16(off); off += 2;
              if (marker === 0xFFE1) {
                if (v.getUint32(off + 2) !== 0x45786966) return 1;
                const little = v.getUint16(off + 8) === 0x4949;
                const tags = v.getUint16(off + 14, little);
                for (let i = 0; i < tags; i++) {
                  const t = off + 16 + i * 12;
                  if (t + 10 > buf.byteLength) break;
                  if (v.getUint16(t, little) === 0x0112)
                    return v.getUint16(t + 8, little);
                }
                return 1;
              }
              if ((marker & 0xFF00) !== 0xFF00) break;
              off += v.getUint16(off);
            }
          } catch {}
          return 1;
        }

        // ── Convert blob → EXIF-corrected canvas base64 ─────
        async function blobToB64(blob) {
          const buf = await blob.arrayBuffer();
          const orient = getExifOrientation(buf);
          const objUrl = URL.createObjectURL(blob);
          return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
              const nw = img.naturalWidth, nh = img.naturalHeight;
              const swap = [5,6,7,8].includes(orient);
              const canvas = document.createElement('canvas');
              canvas.width  = swap ? nh : nw;
              canvas.height = swap ? nw : nh;
              const ctx = canvas.getContext('2d');
              switch (orient) {
                case 2: ctx.transform(-1,0,0,1,nw,0); break;
                case 3: ctx.transform(-1,0,0,-1,nw,nh); break;
                case 4: ctx.transform(1,0,0,-1,0,nh); break;
                case 5: ctx.transform(0,1,1,0,0,0); break;
                case 6: ctx.transform(0,1,-1,0,nh,0); break;
                case 7: ctx.transform(0,-1,-1,0,nh,nw); break;
                case 8: ctx.transform(0,-1,1,0,0,nw); break;
              }
              ctx.drawImage(img, 0, 0);
              URL.revokeObjectURL(objUrl);
              resolve({ b64: canvas.toDataURL('image/jpeg', 0.88), w: canvas.width, h: canvas.height });
            };
            img.onerror = () => { URL.revokeObjectURL(objUrl); resolve(null); };
            img.src = objUrl;
          });
        }

        // ── Step 1: Collect unique image receipt paths ───────
        const pathSet = new Set();
        expenses.forEach(e => {
          parseReceiptUrls(e.receipt_url).forEach(url => {
            if (!url.toLowerCase().includes('.pdf')) {
              const p = extractPath(url); if (p) pathSet.add(p);
            }
          });
        });
        const allPaths = [...pathSet];

        // ── Step 2: Batch-fetch signed URLs in parallel ──────
        setProg(`Fetching ${allPaths.length} receipt URLs…`, 8);
        const signedMap = {};
        const BATCH = 10;
        for (let i = 0; i < allPaths.length; i += BATCH) {
          await Promise.all(allPaths.slice(i, i + BATCH).map(async p => {
            try {
              const r = await fetch('/api/receipt-url', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({ path: p }) });
              const { url } = await r.json(); if (url) signedMap[p] = url;
            } catch {}
          }));
          setProg(`Fetching URLs… ${Math.min(i+BATCH,allPaths.length)}/${allPaths.length}`, 8 + (Math.min(i+BATCH,allPaths.length)/Math.max(allPaths.length,1))*22);
        }

        // ── Step 3: Batch-download & EXIF-correct images ────
        const fetchedPaths = Object.keys(signedMap);
        setProg(`Downloading ${fetchedPaths.length} images…`, 30);
        const imgMap = {};
        for (let i = 0; i < fetchedPaths.length; i += BATCH) {
          await Promise.all(fetchedPaths.slice(i, i + BATCH).map(async p => {
            try {
              const r = await fetch(signedMap[p]);
              const blob = await r.blob();
              const result = await blobToB64(blob);
              if (result) imgMap[p] = result;
            } catch {}
          }));
          setProg(`Processing images… ${Math.min(i+BATCH,fetchedPaths.length)}/${fetchedPaths.length}`, 30 + (Math.min(i+BATCH,fetchedPaths.length)/Math.max(fetchedPaths.length,1))*50);
        }

        // ── Step 4: Build PDF (synchronous — all data ready) ─
        setProg('Building PDF…', 82);
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        const margin = 14;

        // Group expenses by department → employee
        const deptMap = {};
        expenses.forEach(e => {
          const d = e.users?.department || 'Unknown';
          if (!deptMap[d]) deptMap[d] = { employees:{}, total:0, count:0 };
          const uid = e.user_id;
          if (!deptMap[d].employees[uid]) deptMap[d].employees[uid] = { user:e.users||{}, expenses:[] };
          deptMap[d].employees[uid].expenses.push(e);
          deptMap[d].total += Number(e.approved_amount ?? e.amount ?? 0);
          deptMap[d].count++;
        });
        const depts = Object.keys(deptMap).sort();
        const isMultiDept = depts.length > 1;
        const empFilterId = (document.getElementById('f-employee')?.value || '').trim();
        const empFilterName = empFilterId ? (expenses.find(e => e.user_id === empFilterId)?.users?.name || '') : '';
        const filterLabel = opts.fileLabel || empFilterName || (isMultiDept ? 'All Departments' : (depts[0] || dept));

        // Tracks which employee is currently being rendered, so multi-page
        // expense lists still show "who" and their final total on every page.
        let pageCtxEmpName = '';
        let pageCtxEmpTotal = 0;

        // ── Plain B&W page header (no colored banner) ────────
        function drawPageBanner() {
          doc.setTextColor(0,0,0);
          doc.setFontSize(11); doc.setFont(undefined,'bold');
          doc.text('ExpenseTrack — Expense Report', margin, 12);
          doc.setFontSize(8); doc.setFont(undefined,'normal');
          const rightText = pageCtxEmpName
            ? `${pageCtxEmpName}   |   Total: Rs. ${pageCtxEmpTotal.toLocaleString('en-IN',{minimumFractionDigits:2})}`
            : `${filterLabel}   |   ${monthLabel}   |   ${new Date().toLocaleDateString('en-IN')}`;
          doc.text(rightText, pageW-margin, 12, {align:'right'});
          doc.setDrawColor(0,0,0); doc.setLineWidth(0.3);
          doc.line(margin, 15, pageW-margin, 15);
        }
        function newPage() { doc.addPage(); drawPageBanner(); return 20; }

        // ── TOC (only for All Departments) ───────────────────
        const tocYPos = [];
        if (isMultiDept) {
          drawPageBanner();
          let ty = 24;
          doc.setFontSize(14); doc.setFont(undefined,'bold'); doc.setTextColor(0,0,0);
          doc.text('Table of Contents', margin, ty); ty += 6;
          doc.setFontSize(8); doc.setFont(undefined,'normal');
          doc.text(`${depts.length} departments  |  ${expenses.length} total expenses  |  ${monthLabel}`, margin, ty); ty += 5;
          doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
          doc.line(margin, ty, pageW-margin, ty); ty += 5;
          depts.forEach((d, i) => {
            const info = deptMap[d];
            doc.setFontSize(9); doc.setFont(undefined,'bold'); doc.setTextColor(0,0,0);
            doc.text(`${i+1}.  ${d}`, margin+2, ty+3);
            doc.setFont(undefined,'normal');
            doc.text(`${info.count} expense${info.count!==1?'s':''}`, margin+95, ty+3);
            doc.setFont(undefined,'bold');
            doc.text(`Rs. ${info.total.toLocaleString('en-IN',{minimumFractionDigits:2})}`, pageW-margin-22, ty+3);
            doc.text('p.--', pageW-margin-2, ty+3, {align:'right'});
            tocYPos.push(ty+3); ty += 7;
          });
        }

        // ── Department sections ───────────────────────────────
        const deptPageNums = {};
        let y = isMultiDept ? newPage() : (drawPageBanner(), 20);

        depts.forEach((deptName, dIdx) => {
          pageCtxEmpName = ''; // department divider page shows the generic header
          if (dIdx > 0) y = newPage();
          deptPageNums[deptName] = doc.internal.getCurrentPageInfo().pageNumber;
          try { doc.outline.add(null, deptName, { pageNumber: deptPageNums[deptName] }); } catch {}

          // Department header — plain text + underline
          doc.setTextColor(0,0,0);
          doc.setFontSize(12); doc.setFont(undefined,'bold');
          doc.text(`DEPARTMENT: ${deptName}`, margin, y+5);
          doc.setFontSize(8); doc.setFont(undefined,'normal');
          const di = deptMap[deptName];
          doc.text(`${di.count} expense${di.count!==1?'s':''}  |  Total: Rs. ${di.total.toLocaleString('en-IN',{minimumFractionDigits:2})}`, pageW-margin, y+5, {align:'right'});
          doc.setDrawColor(0,0,0); doc.setLineWidth(0.4);
          doc.line(margin, y+7, pageW-margin, y+7);
          y += 11;

          let deptTotal = 0;
          Object.values(di.employees).forEach(({ user, expenses: empExps }) => {
            pageCtxEmpName = user.name || '—';
            pageCtxEmpTotal = empExps.reduce((s, e) => s + Number(e.approved_amount ?? e.amount ?? 0), 0);
            if (y > 260) y = newPage();

            // Employee header — plain text + thin underline
            doc.setTextColor(0,0,0);
            doc.setFontSize(10); doc.setFont(undefined,'bold');
            doc.text(`${user.name||'—'}  (${user.emp_no||'—'})`, margin, y+4);
            doc.setFontSize(7.5); doc.setFont(undefined,'normal');
            doc.text(`${user.email||'—'}  |  ${user.phone||'—'}`, pageW-margin, y+4, {align:'right'});
            doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
            doc.line(margin, y+6, pageW-margin, y+6);
            y += 9;

            empExps.forEach(e => {
              if (y > 275) y = newPage();
              const amt = e.approved_amount != null ? e.approved_amount : e.amount;
              deptTotal += Number(amt||0);
              const statusTxt = e.status.replace('_',' ').toUpperCase();
              const desc = (e.description||'').replace(/^[A-Z_]+\|/,'').replace(/\|/g,' ').substring(0,60);

              // Single compact text line: Date | Category | Description ........... Rs. X.XX [STATUS]
              doc.setTextColor(0,0,0); doc.setFontSize(8.5);
              doc.setFont(undefined,'bold');
              doc.text(formatDate(e.created_at), margin, y+4);
              doc.text(e.category||'—', margin+25, y+4);
              doc.setFont(undefined,'normal');
              doc.text(desc, margin+55, y+4);
              doc.setFont(undefined,'bold');
              const amtStr = `Rs. ${Number(amt).toLocaleString('en-IN',{minimumFractionDigits:2})}`;
              doc.text(amtStr, pageW-margin-22, y+4, {align:'right'});
              doc.setFont(undefined,'normal'); doc.setFontSize(7);
              doc.text(`[${statusTxt}]`, pageW-margin, y+4, {align:'right'});
              y += 5;

              // Approval info — small italic-style text line
              if (e.l1_by_name || e.l2_by_name) {
                doc.setFontSize(7); doc.setFont(undefined,'normal');
                let t = '';
                if (e.l1_by_name) t += `L1: ${e.l1_by_name} (${e.l1_at?formatDate(e.l1_at):'—'})   `;
                if (e.l2_by_name) t += `L2: ${e.l2_by_name} (${e.l2_at?formatDate(e.l2_at):'—'})`;
                doc.text(t, margin, y+3);
                y += 4;
              }

              // Receipt images — UNCHANGED size, plain border
              parseReceiptUrls(e.receipt_url).forEach(url => {
                if (url.toLowerCase().includes('.pdf')) {
                  doc.setFontSize(7); doc.setFont(undefined,'normal');
                  doc.text('PDF Receipt — open in app to view', margin, y+4); y += 6;
                } else {
                  const p = extractPath(url);
                  if (!p || !imgMap[p]) return;
                  const { b64, w: natW, h: natH } = imgMap[p];
                  const maxW = pageW-margin*2-10, maxH = 200;
                  let dW = maxW, dH = maxW;
                  if (natW>0 && natH>0) { const r=natH/natW; dH=Math.min(maxW*r,maxH); dW=dH/r; if(dW>maxW){dW=maxW;dH=maxW*r;} }
                  if (y+dH+3 > 285) y = newPage();
                  try {
                    doc.addImage(b64,'JPEG',margin+5,y+1,dW,dH,undefined,'MEDIUM');
                    doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
                    doc.rect(margin+5,y+1,dW,dH);
                    y += dH + 4;
                  } catch {}
                }
              });

              // Thin separator between expenses
              doc.setDrawColor(180,180,180); doc.setLineWidth(0.1);
              doc.line(margin, y, pageW-margin, y); y += 2;
            });

            // Per-employee total — plain bold text with top/bottom rule
            if (y > 280) y = newPage();
            doc.setDrawColor(0,0,0); doc.setLineWidth(0.3);
            doc.line(margin, y, pageW-margin, y);
            doc.setTextColor(0,0,0); doc.setFontSize(9); doc.setFont(undefined,'bold');
            doc.text(`${user.name||'—'} — Total`, margin, y+5);
            doc.text(`Rs. ${pageCtxEmpTotal.toLocaleString('en-IN',{minimumFractionDigits:2})}`, pageW-margin, y+5, {align:'right'});
            doc.line(margin, y+7, pageW-margin, y+7);
            y += 11;
          });

          // Department subtotal — double underline
          if (y > 278) y = newPage();
          doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
          doc.line(margin, y, pageW-margin, y);
          doc.setTextColor(0,0,0); doc.setFontSize(10); doc.setFont(undefined,'bold');
          doc.text(`${deptName} — TOTAL`, margin, y+6);
          doc.text(`Rs. ${deptTotal.toLocaleString('en-IN',{minimumFractionDigits:2})}`, pageW-margin, y+6, {align:'right'});
          doc.line(margin, y+8, pageW-margin, y+8);
          doc.line(margin, y+8.7, pageW-margin, y+8.7);
          y += 13;
        });

        // ── Page numbers ─────────────────────────────────────
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
          doc.setPage(i); doc.setFontSize(7); doc.setTextColor(0,0,0);
          doc.text(`Page ${i} of ${totalPages}`, pageW/2, 290, {align:'center'});
        }

        // ── Back-fill TOC page numbers ────────────────────────
        if (isMultiDept) {
          doc.setPage(1);
          depts.forEach((deptName, i) => {
            const pgNum = deptPageNums[deptName];
            const ty = tocYPos[i];
            if (!pgNum || !ty) return;
            doc.setFillColor(255,255,255); doc.rect(pageW-margin-18, ty-4, 18, 6, 'F');
            doc.setFontSize(8); doc.setFont(undefined,'bold'); doc.setTextColor(0,0,0);
            doc.text(`p.${pgNum}`, pageW-margin-2, ty, {align:'right'});
          });
        }

        setProg('Saving PDF…', 96);
        doc.save(`ExpenseReport_${filterLabel.replace(/[^a-z0-9]/gi,'_')}_${monthLabel.replace(/\s/g,'_')}.pdf`);
        doneProg(`PDF saved — ${expenses.length} expenses, ${fetchedPaths.length} receipts`);

      } catch (err) {
        console.error('PDF error:', err);
        doneProg('PDF failed: ' + err.message, true);
      }
    }

    // ─── THEME & BULK HELPERS ───────────────────────────────────
    function initTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        updateThemeUI(true);
      }
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeUI(isDark);
    }

    function updateThemeUI(isDark) {
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-text').textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }

    function toggleAllCheckboxes(master) {
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.checked = master.checked;
      });
      updateBulkBar();
    }

    function updateBulkBar() {
      const checked = document.querySelectorAll('.row-checkbox:checked');
      const bar = document.getElementById('bulk-bar');
      const text = document.getElementById('bulk-count-text');

      if (checked.length > 0) {
        bar.classList.add('active');
        text.textContent = `${checked.length} item${checked.length > 1 ? 's' : ''} selected`;
      } else {
        bar.classList.remove('active');
      }
    }

    async function bulkStatusUpdate(status) {
      const checked = document.querySelectorAll('.row-checkbox:checked');
      const ids = Array.from(checked).map(cb => cb.value);

      let reason = null;
      if (status === 'rejected') {
        reason = prompt("Please enter a reason for rejection (applied to all selected):");
        if (reason === null) return;
      }

      if (!confirm(`Are you sure you want to ${status} ${ids.length} expenses?`)) return;

      try {
        const { error } = await db
          .from('expenses')
          .update({ status, rejection_reason: reason })
          .in('id', ids);

        if (error) throw error;

        showMessage(`Successfully ${status} ${ids.length} items.`, 'success');
        document.getElementById('select-all').checked = false;
        updateBulkBar();
        loadAdminExpenses();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    // ── HIERARCHY VIEW ────────────────────────────────────────

    function buildHierarchyTree(expenses) {
      const tree = {};
      expenses.forEach(e => {
        const dept = (e.users?.department || '').trim() || 'Unassigned';
        if (!tree[dept]) tree[dept] = { dept, managers: {} };
        const lms = getLM(dept);
        const addEmp = (mgrKey, mgr) => {
          if (!tree[dept].managers[mgrKey]) tree[dept].managers[mgrKey] = { mgr, employees: {} };
          const uid = e.user_id;
          if (!tree[dept].managers[mgrKey].employees[uid])
            tree[dept].managers[mgrKey].employees[uid] = { user: e.users, expenses: [] };
          tree[dept].managers[mgrKey].employees[uid].expenses.push(e);
        };
        if (lms && lms.length) lms.forEach(m => addEmp(m.code, m));
        else addEmp('__no_mgr__', null);
      });
      return tree;
    }

    function renderHierarchyView(expenses) {
      const container = document.getElementById('hier-container');
      const summaryEl = document.getElementById('hier-summary');
      if (!container) return;

      const search = (document.getElementById('f-user-search')?.value || '').toLowerCase().trim();
      const mgrFilter = (document.getElementById('f-manager')?.value || '').trim();

      let filtered = expenses;
      if (search) filtered = filtered.filter(e =>
        (e.users?.name || '').toLowerCase().includes(search) ||
        (e.users?.email || '').toLowerCase().includes(search) ||
        (e.users?.emp_no || '').toLowerCase().includes(search)
      );
      if (mgrFilter) filtered = filtered.filter(e => {
        const lms = getLM(e.users?.department);
        return lms && lms.some(m => m.name === mgrFilter);
      });
      filtered = applyDeptSelectFilter(filtered);

      const tree = buildHierarchyTree(filtered);
      const depts = Object.keys(tree).sort((a, b) =>
        a === 'Unassigned' ? 1 : b === 'Unassigned' ? -1 : a.localeCompare(b)
      );

      // Summary chips
      const totalEmps = new Set(filtered.map(e => e.user_id)).size;
      const pendingCnt = filtered.filter(e => e.status === 'pending').length;
      const l1Cnt = filtered.filter(e => e.status === 'l1_approved').length;
      const approvedSum = filtered.filter(e => e.status === 'approved')
        .reduce((s, e) => s + (e.approved_amount != null ? +e.approved_amount : +e.amount), 0);
      if (summaryEl) summaryEl.innerHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:.625rem;margin-bottom:1.25rem;align-items:center">
          <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:.375rem .875rem;font-size:.78rem;font-weight:700;color:#1e40af">👥 ${totalEmps} Employees</div>
          ${pendingCnt ? `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:.375rem .875rem;font-size:.78rem;font-weight:700;color:#92400e">⏳ ${pendingCnt} Pending</div>` : ''}
          ${l1Cnt ? `<div style="background:#ede9fe;border:1px solid #c4b5fd;border-radius:10px;padding:.375rem .875rem;font-size:.78rem;font-weight:700;color:#5b21b6">🔍 ${l1Cnt} In Review</div>` : ''}
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:.375rem .875rem;font-size:.78rem;font-weight:700;color:#065f46">✅ ${formatCurrency(approvedSum)} Approved</div>
          <div style="margin-left:auto;display:flex;gap:.4rem">
            <button class="btn btn-secondary btn-sm" style="font-size:.75rem;border-radius:8px" onclick="hierExpandAll()">Expand All</button>
            <button class="btn btn-secondary btn-sm" style="font-size:.75rem;border-radius:8px" onclick="hierCollapseAll()">Collapse All</button>
          </div>
        </div>`;

      if (!depts.length) {
        container.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-muted)"><div style="font-size:2.5rem;margin-bottom:.75rem">🔍</div><p style="font-weight:700;font-size:1.1rem;margin:0">No results</p><p style="font-size:.85rem;margin:.25rem 0 0">Try adjusting filters or search</p></div>`;
        return;
      }

      if (search || mgrFilter) {
        depts.forEach(dept => {
          hierExpanded.depts.add(dept);
          Object.keys(tree[dept].managers).forEach(mk => hierExpanded.mgrs.add(mk + '||' + dept));
        });
      }

      container.innerHTML = depts.map(dept => {
        const dData = tree[dept];
        const col = deptColor(dept);
        const dId = 'dept__' + dept.replace(/[^a-z0-9]/gi, '_');

        let dEmps = new Set(), dPend = 0, dL1 = 0, dAppr = 0;
        Object.values(dData.managers).forEach(md => {
          Object.values(md.employees).forEach(ed => {
            dEmps.add(ed.user?.id);
            ed.expenses.forEach(e => {
              if (e.status === 'pending') dPend++;
              if (e.status === 'l1_approved') dL1++;
              if (e.status === 'approved') dAppr += (e.approved_amount != null ? +e.approved_amount : +e.amount);
            });
          });
        });

        const dOpen = hierExpanded.depts.has(dept);
        const mgrs = Object.entries(dData.managers).sort(([ka],[kb]) => ka === '__no_mgr__' ? 1 : kb === '__no_mgr__' ? -1 : (dData.managers[ka].mgr?.name||'').localeCompare(dData.managers[kb].mgr?.name||''));

        return `
        <div style="margin-bottom:.875rem">
          <div onclick="hierToggleDept('${dId}','${dept.replace(/'/g,"\\'")}');"
               style="display:flex;align-items:center;gap:.875rem;padding:1rem 1.25rem;border-radius:0 14px 14px 0;border:1px solid var(--border);border-left:4px solid ${col};cursor:pointer;background:var(--card-bg,#fff);color:var(--text-1);user-select:none;transition:background .15s"
               onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background='var(--card-bg,#fff)'">
            <div style="flex:1;min-width:0;display:flex;align-items:center;gap:.625rem;flex-wrap:wrap">
              <span style="font-weight:800;font-size:1rem">${escHtml(dept)}</span>
              <span style="background:var(--bg-2);color:var(--text-muted);border-radius:6px;padding:1px 7px;font-size:.72rem;font-weight:700">${dEmps.size} emp</span>
              ${dPend ? `<span style="background:#fef3c7;color:#92400e;border-radius:6px;padding:1px 7px;font-size:.72rem;font-weight:700">⏳ ${dPend}</span>` : ''}
              ${dL1 ? `<span style="background:#ede9fe;color:#5b21b6;border-radius:6px;padding:1px 7px;font-size:.72rem;font-weight:700">🔍 ${dL1}</span>` : ''}
              <span style="background:#dcfce7;color:#166534;border-radius:6px;padding:1px 7px;font-size:.72rem;font-weight:700" title="Sum of approved expenses only">✅ Approved: ${formatCurrency(dAppr)}</span>
            </div>
            <svg id="chev-${dId}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
                 style="width:20px;height:20px;flex-shrink:0;transition:transform .2s;transform:${dOpen?'rotate(180deg)':'rotate(0deg)'};color:var(--text-muted)">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
          <div id="hnode-${dId}" style="display:${dOpen?'block':'none'};padding:.5rem 0 0 .75rem">
            ${mgrs.map(([mgrKey, mgrData]) => {
              const mgr = mgrData.mgr;
              const empArr = Object.values(mgrData.employees).sort((a,b)=>(a.user?.name||'').localeCompare(b.user?.name||''));
              let mPend = 0, mL1 = 0, mAppr = 0;
              empArr.forEach(ed => ed.expenses.forEach(e => {
                if (e.status==='pending') mPend++;
                if (e.status==='l1_approved') mL1++;
                if (e.status==='approved') mAppr += (e.approved_amount!=null?+e.approved_amount:+e.amount);
              }));
              const mId = 'mgr__' + (mgrKey).replace(/[^a-z0-9]/gi,'_') + '__' + dept.replace(/[^a-z0-9]/gi,'_');
              const mOpen = hierExpanded.mgrs.has(mId);
              const mi = mgr ? (mgr.name[0]||'?').toUpperCase() : '?';

              return `
              <div style="border:1px solid var(--border);border-radius:12px;margin-bottom:.5rem;overflow:hidden;background:var(--card-bg,#fff)">
                <div onclick="hierToggleMgr('${mId}');"
                     style="display:flex;align-items:center;gap:.875rem;padding:.875rem 1rem;cursor:pointer;transition:background .15s"
                     onmouseover="this.style.background='var(--bg-page,#f9fafb)'" onmouseout="this.style.background=''">
                  <div style="width:40px;height:40px;border-radius:12px;background:${col}18;color:${col};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0">${mi}</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:700;font-size:.9rem">${mgr ? escHtml(mgr.name) : '<span style="color:var(--text-muted)">No Manager Assigned</span>'}</div>
                    <div style="font-size:.72rem;color:var(--text-muted);margin-top:1px">${mgr ? `${escHtml(mgr.code)} · ${escHtml(dept)} · 📱 ${escHtml(mgr.phone||'—')}` : escHtml(dept)}</div>
                  </div>
                  <div style="display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;justify-content:flex-end">
                    <span style="background:#f3f4f6;border-radius:6px;padding:1px 7px;font-size:.7rem;font-weight:600;color:#374151">${empArr.length} emp</span>
                    ${mPend ? `<span style="background:#fef3c7;color:#92400e;border-radius:6px;padding:1px 7px;font-size:.7rem;font-weight:700">⏳${mPend}</span>` : ''}
                    ${mL1 ? `<span style="background:#ede9fe;color:#5b21b6;border-radius:6px;padding:1px 7px;font-size:.7rem;font-weight:700">🔍${mL1}</span>` : ''}
                    <span style="background:#f0fdf4;color:#065f46;border-radius:6px;padding:1px 7px;font-size:.7rem;font-weight:700" title="Sum of approved expenses only">✅ Approved: ${formatCurrency(mAppr)}</span>
                    <svg id="chev-${mId}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
                         style="width:16px;height:16px;color:var(--text-muted);transition:transform .2s;flex-shrink:0;transform:${mOpen?'rotate(180deg)':''}">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                  </div>
                </div>
                <div id="hnode-${mId}" style="display:${mOpen?'block':'none'}">
                  ${empArr.map(ed => {
                    const user = ed.user || {};
                    const exps = ed.expenses;
                    const ePend = exps.filter(e=>e.status==='pending').length;
                    const eL1   = exps.filter(e=>e.status==='l1_approved').length;
                    const eAppr = exps.filter(e=>e.status==='approved').length;
                    const eRej  = exps.filter(e=>e.status==='rejected'||e.status==='l1_rejected').length;
                    const eAmt  = exps.reduce((s,e)=>{
                      if(e.status==='rejected'||e.status==='l1_rejected') return s;
                      return s+(e.approved_amount!=null?+e.approved_amount:+e.amount);
                    },0);
                    const eId = 'emp__' + (user.id||'x').replace(/[^a-z0-9]/gi,'_');
                    const eOpen = hierExpanded.emps.has(eId);
                    const ei = (user.name?.[0]||user.email?.[0]||'?').toUpperCase();
                    const lmsE = getLM(user.department);

                    return `
                    <div style="border-top:1px solid var(--border)">
                      <div onclick="hierToggleEmp('${eId}');"
                           style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem .75rem 1.25rem;cursor:pointer;transition:background .15s"
                           onmouseover="this.style.background='var(--bg-page,#f9fafb)'" onmouseout="this.style.background=''">
                        <div style="width:34px;height:34px;border-radius:10px;background:${col}12;color:${col};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;flex-shrink:0">${ei}</div>
                        <div style="flex:1;min-width:0">
                          <div style="font-weight:700;font-size:.85rem">${escHtml(user.name||'—')}</div>
                          <div style="font-size:.7rem;color:var(--text-muted)">${user.emp_no?`🆔${escHtml(user.emp_no)}`:''}${user.department?` · ${escHtml(user.department)}`:''}</div>
                        </div>
                        <div style="display:flex;flex-wrap:wrap;gap:.25rem;align-items:center;justify-content:flex-end">
                          ${ePend?`<span style="background:#fef3c7;color:#92400e;border-radius:5px;padding:0 6px;font-size:.68rem;font-weight:700">⏳${ePend}</span>`:''}
                          ${eL1?`<span style="background:#ede9fe;color:#5b21b6;border-radius:5px;padding:0 6px;font-size:.68rem;font-weight:700">🔍${eL1}</span>`:''}
                          ${eAppr?`<span style="background:#d1fae5;color:#065f46;border-radius:5px;padding:0 6px;font-size:.68rem;font-weight:700">✓${eAppr}</span>`:''}
                          ${eRej?`<span style="background:#fee2e2;color:#991b1b;border-radius:5px;padding:0 6px;font-size:.68rem;font-weight:700">✗${eRej}</span>`:''}
                          <span style="font-size:.78rem;font-weight:700;color:var(--primary)" title="Sum of pending + in-review + approved (excludes rejected)">Overall: ${formatCurrency(eAmt)}</span>
                          <svg id="chev-${eId}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
                               style="width:14px;height:14px;color:var(--text-muted);transition:transform .2s;flex-shrink:0;transform:${eOpen?'rotate(180deg)':''}">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                          </svg>
                        </div>
                      </div>
                      <div id="hnode-${eId}" style="display:${eOpen?'block':'none'};background:var(--bg-page,#f9fafb);border-top:1px solid var(--border)">
                        ${renderHierEmpDetail(user, exps, lmsE)}
                      </div>
                    </div>`;
                  }).join('')}
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');
    }

    function renderHierEmpDetail(user, expenses, lms) {
      // Group by month/cycle
      const groups = {};
      expenses.forEach(e => {
        const d = new Date(e.created_at);
        const mY = d.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cT = d.getDate() <= 15 ? '1st - 15th' : '16th - End';
        const k = mY + '||' + cT;
        if (!groups[k]) groups[k] = { mY, cT, entries: [] };
        groups[k].entries.push(e);
      });
      const sorted = Object.values(groups).sort((a,b) => new Date(b.entries[0].created_at) - new Date(a.entries[0].created_at));

      return `
      <div style="padding:.875rem 1rem">
        <!-- Employee info -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.625rem;background:var(--card-bg,#fff);border:1px solid var(--border);border-radius:10px;padding:.875rem;margin-bottom:.75rem;font-size:.8rem">
          ${[['👤 Name',user.name],['🆔 Emp No',user.emp_no],['📧 Email',user.email],
             ['📱 Mobile',user.phone],['🏢 Dept',user.department],['📍 Site',user.site_name],
             ...(lms ? [['👔 Manager', lms.map(m=>m.name).join(' / ')]] : [])
            ].map(([l,v])=>v?`<div style="min-width:0;overflow:hidden"><div style="font-size:.6rem;text-transform:uppercase;font-weight:700;color:var(--text-muted);margin-bottom:2px">${l}</div><div style="font-weight:600;word-break:break-all;overflow-wrap:anywhere">${escHtml(String(v))}</div></div>`:'').filter(Boolean).join('')}
        </div>
        ${(user.bank_holder||user.bank_name) ? `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.625rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:.875rem;margin-bottom:.75rem;font-size:.8rem">
          <div style="grid-column:1/-1;font-size:.6rem;font-weight:700;color:#1e40af;text-transform:uppercase;margin-bottom:.1rem">🏦 Bank Details</div>
          ${[['Holder',user.bank_holder],['Bank',user.bank_name],['IFSC',user.bank_ifsc],
             ['Acct No',user.bank_account||null]
            ].map(([l,v])=>v?`<div><div style="font-size:.6rem;text-transform:uppercase;font-weight:700;color:#3b82f6;margin-bottom:2px">${l}</div><div style="font-weight:700;color:#1e3a8a">${escHtml(String(v))}</div></div>`:'').filter(Boolean).join('')}
        </div>` : ''}
        <!-- Site-wise summary -->
        ${(()=>{
          const siteData = {};
          expenses.forEach(e => {
            if (e.status === 'rejected' || e.status === 'l1_rejected') return;
            const site = extractSite(e) || user.site_name || 'Unassigned';
            const amt  = e.approved_amount != null ? +e.approved_amount : +e.amount;
            if (!siteData[site]) siteData[site] = { total: 0, days: new Set(), count: 0 };
            siteData[site].total += amt;
            siteData[site].days.add(new Date(e.created_at).toDateString());
            siteData[site].count++;
          });
          const sites = Object.entries(siteData).sort(([a],[b]) => a.localeCompare(b));
          if (!sites.length) return '';
          const overallTotal = sites.reduce((s,[,d]) => s + d.total, 0);
          return `
          <div style="border:1px solid #e0e7ff;border-radius:10px;overflow:hidden;margin-bottom:.75rem">
            <div style="background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center">
              <span style="color:#fff;font-weight:700;font-size:.8rem">📍 Site-wise Summary</span>
              <span style="color:rgba(255,255,255,.85);font-size:.75rem;font-weight:600">Overall: ${formatCurrency(overallTotal)}</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem;padding:.75rem;background:#f5f3ff">
              ${sites.map(([site, d]) => `
              <div style="background:#fff;border:1px solid #c4b5fd;border-radius:8px;padding:.6rem .75rem">
                <div style="font-size:.72rem;font-weight:700;color:#5b21b6;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escHtml(site)}">📍 ${escHtml(site)}</div>
                <div style="font-size:1rem;font-weight:800;color:#4f46e5">${formatCurrency(d.total)}</div>
                <div style="font-size:.65rem;color:#7c3aed;margin-top:.15rem">${d.count} entries · ${d.days.size} day${d.days.size!==1?'s':''}</div>
              </div>`).join('')}
            </div>
          </div>`;
        })()}
        <!-- Cycle groups -->
        ${sorted.map(g => {
          const safeKey = `${user.id}|${g.mY}|${g.cT}`;
          const gTotal = g.entries.reduce((s,e)=>{
            if(e.status==='rejected'||e.status==='l1_rejected') return s;
            return s+(e.approved_amount!=null?+e.approved_amount:+e.amount);
          },0);
          return `
          <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.625rem;background:var(--card-bg,#fff)">
            <div style="padding:.625rem 1rem;background:var(--bg-page,#f9fafb);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
              <div>
                <span style="font-weight:700;font-size:.85rem">${escHtml(g.mY)}</span>
                <span style="background:var(--primary);color:white;border-radius:5px;padding:0 7px;font-size:.68rem;font-weight:700;margin-left:.4rem">${escHtml(g.cT)}</span>
                <span style="font-size:.72rem;color:var(--text-muted);margin-left:.5rem">${g.entries.length} entries · ${formatCurrency(gTotal)}</span>
              </div>
              <div style="display:flex;gap:.3rem;flex-wrap:wrap">
                <button class="btn btn-primary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px;display:none" onclick="approveEntireCycle('${safeKey}',this)">✓ Approve Cycle</button>
                <button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px" onclick="exportCycleToExcel('${safeKey}')">Excel</button>
                <button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px;background:#0f172a;color:white;border:none" onclick="exportCycleToCSV('${safeKey}')">CSV</button>
                <button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px;background:#dc2626;color:white;border:none" onclick="exportCycleToPDF('${safeKey}')">PDF</button>
                <button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:.2rem .55rem;border-radius:7px;background:#047857;color:white;border:none" onclick="exportCycleToPaymentSheet('${safeKey}')">Payment</button>
              </div>
            </div>
            <div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;font-size:.8rem">
                <thead>
                  <tr style="background:var(--bg-page,#f9fafb)">
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;font-weight:700">Date</th>
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Category</th>
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Description</th>
                    <th style="padding:.5rem .75rem;text-align:right;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700;white-space:nowrap">Amount</th>
                    <th style="padding:.5rem .75rem;text-align:left;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Status</th>
                    <th style="padding:.5rem .75rem;text-align:right;font-size:.65rem;text-transform:uppercase;color:var(--text-muted);font-weight:700">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${g.entries.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).map(e => {
                    const apAmt = e.approved_amount!=null?e.approved_amount:e.amount;
                    const changed = e.approved_amount!=null && +e.approved_amount!==+e.amount;
                    const showL1 = currentProfile.role==='admin' && e.status==='pending';
                    const showL2 = currentProfile.role==='super_admin' && e.status==='l1_approved';
                    const showDir= currentProfile.role==='super_admin' && e.status==='pending';
                    return `
                    <tr style="border-top:1px solid var(--border)">
                      <td style="padding:.5rem .75rem;white-space:nowrap;color:var(--text-muted)">${new Date(e.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</td>
                      <td style="padding:.5rem .75rem">${catPill(e.category)}</td>
                      <td style="padding:.5rem .75rem;max-width:220px">
                        <div>${parseDescForDisplay(e.description)}</div>
                        ${e.rejection_reason?`<div style="font-size:.7rem;color:#dc2626;margin-top:.2rem">💬 ${escHtml(e.rejection_reason)}</div>`:''}
                        ${e.l1_remark?`<div style="font-size:.68rem;color:#3b82f6;margin-top:.15rem">L1: ${escHtml(e.l1_remark)}</div>`:''}
                        ${e.l2_remark?`<div style="font-size:.68rem;color:#16a34a;margin-top:.15rem">L2: ${escHtml(e.l2_remark)}</div>`:''}
                      </td>
                      <td style="padding:.5rem .75rem;text-align:right;white-space:nowrap">
                        ${changed?`<div style="text-decoration:line-through;color:var(--text-muted);font-size:.7rem">${formatCurrency(e.amount)}</div>`:''}
                        <div style="font-weight:700;color:var(--primary)">${formatCurrency(apAmt)}</div>
                      </td>
                      <td style="padding:.5rem .75rem">
                        ${approvalStepper(e)}
                        ${e.l1_by_name?`<div style="font-size:.62rem;color:var(--text-muted);margin-top:.2rem">L1: ${escHtml(e.l1_by_name)}</div>`:''}
                        ${e.l2_by_name?`<div style="font-size:.62rem;color:var(--text-muted)">L2: ${escHtml(e.l2_by_name)}</div>`:''}
                        ${parseReceiptUrls(e.receipt_url).length?`<a href="javascript:void(0)" data-rcpt-eid="${e.id}" onclick="viewExpenseReceipts('${escHtml(e.receipt_url)}','${e.id}')" style="font-size:.68rem;color:var(--primary);font-weight:600">📎 ${parseReceiptUrls(e.receipt_url).length>1?parseReceiptUrls(e.receipt_url).length+' Receipts':'Receipt'}</a>${receiptSeenBadge(e.id)}`:''}
                        ${currentProfile.role==='super_admin'?`<button data-sa-edit="${e.id}" onclick="saEditReceipt('${e.id}')" style="display:block;margin-top:.2rem;background:none;border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-size:.65rem;cursor:pointer;color:var(--text-muted)">📎 ${parseReceiptUrls(e.receipt_url).length?'Edit':'Add'} Receipt</button>`:''}
                      </td>
                      <td style="padding:.5rem .75rem;text-align:right">
                        <div style="display:flex;gap:.2rem;justify-content:flex-end;flex-wrap:wrap">
                          <button class="btn btn-secondary btn-sm" style="padding:.18rem .4rem;font-size:.7rem" onclick="openCommentModal('${e.id}')">💬</button>
                          ${showL1?`<button class="btn btn-primary btn-sm" style="padding:.18rem .4rem;font-size:.7rem" onclick="openApprovalModal('${e.id}')">L1</button>`:''}
                          ${showL2?`<button class="btn btn-primary btn-sm" style="padding:.18rem .4rem;font-size:.7rem;background:#7c3aed" onclick="openApprovalModal('${e.id}')">L2</button>`:''}
                          ${showDir?`<button class="btn btn-secondary btn-sm" style="padding:.18rem .4rem;font-size:.7rem" onclick="openApprovalModal('${e.id}')">↑</button>`:''}
                          <button class="btn btn-secondary btn-sm" style="padding:.18rem .4rem;font-size:.7rem;color:#dc2626" onclick="deleteExpense('${e.id}')">🗑️</button>
                        </div>
                      </td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    function hierToggleDept(nodeId, dept) {
      const open = hierExpanded.depts.has(dept);
      if (open) hierExpanded.depts.delete(dept); else hierExpanded.depts.add(dept);
      const el = document.getElementById('hnode-' + nodeId);
      const ch = document.getElementById('chev-' + nodeId);
      if (el) el.style.display = open ? 'none' : 'block';
      if (ch) ch.style.transform = open ? '' : 'rotate(180deg)';
    }

    function hierToggleMgr(id) {
      const open = hierExpanded.mgrs.has(id);
      if (open) hierExpanded.mgrs.delete(id); else hierExpanded.mgrs.add(id);
      const el = document.getElementById('hnode-' + id);
      const ch = document.getElementById('chev-' + id);
      if (el) el.style.display = open ? 'none' : 'block';
      if (ch) ch.style.transform = open ? '' : 'rotate(180deg)';
    }

    function hierToggleEmp(id) {
      const open = hierExpanded.emps.has(id);
      if (open) hierExpanded.emps.delete(id); else hierExpanded.emps.add(id);
      const el = document.getElementById('hnode-' + id);
      const ch = document.getElementById('chev-' + id);
      if (el) el.style.display = open ? 'none' : 'block';
      if (ch) ch.style.transform = open ? '' : 'rotate(180deg)';
    }

    function hierExpandAll() {
      document.querySelectorAll('[id^="hnode-dept__"]').forEach(el => {
        el.style.display = 'block';
        hierExpanded.depts.add(el.id.replace('hnode-dept__','').replace(/_/g,' '));
      });
      document.querySelectorAll('[id^="chev-dept__"]').forEach(el => el.style.transform = 'rotate(180deg)');
      document.querySelectorAll('[id^="hnode-mgr__"]').forEach(el => {
        el.style.display = 'block';
        hierExpanded.mgrs.add(el.id.replace('hnode-',''));
      });
      document.querySelectorAll('[id^="chev-mgr__"]').forEach(el => el.style.transform = 'rotate(180deg)');
    }

    function hierCollapseAll() {
      hierExpanded.depts.clear(); hierExpanded.mgrs.clear(); hierExpanded.emps.clear();
      document.querySelectorAll('[id^="hnode-dept__"],[id^="hnode-mgr__"],[id^="hnode-emp__"]').forEach(el => el.style.display = 'none');
      document.querySelectorAll('[id^="chev-dept__"],[id^="chev-mgr__"],[id^="chev-emp__"]').forEach(el => el.style.transform = '');
    }
  </script>
