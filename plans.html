<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseTrack — Work Plans</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta name="theme-color" content="#6366f1" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ExpenseTrack" />
  <meta name="mobile-web-app-capable" content="yes" />
  <script src="/pwa-register.js" defer></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── Hero ───────────────────────────────────────── */
    .plans-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 55%, #312e81 100%);
      padding: 2.5rem 1.5rem 6.5rem;
      color: white;
    }
    .plans-hero-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    }
    .plans-hero h1 { font-size: 2rem; font-weight: 800; margin: 0; letter-spacing: -0.025em; }
    .plans-hero p  { opacity: .8; margin: .35rem 0 0; font-size: .95rem; }

    .hero-create-btn {
      background: white; color: #312e81; border: none;
      padding: .9rem 1.75rem; border-radius: 14px;
      font-weight: 800; font-size: .9rem; cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      white-space: nowrap; flex-shrink: 0;
      transition: transform .2s, box-shadow .2s;
    }
    .hero-create-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.25); }

    /* ── Stats ──────────────────────────────────────── */
    .plans-stats {
      max-width: 1200px; margin: -3.5rem auto 2rem;
      padding: 0 1.5rem;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;
    }
    .pstat {
      background: white; border-radius: 18px;
      padding: 1.35rem 1.5rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      border: 1px solid rgba(0,0,0,.03);
      display: flex; align-items: center; gap: 1.1rem;
    }
    .pstat-icon {
      width: 50px; height: 50px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem; flex-shrink: 0;
    }
    .pstat-label { font-size: .72rem; color: #6b7280; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .pstat-val   { font-size: 1.65rem; font-weight: 800; color: #111827; margin-top: 2px; line-height: 1; }

    /* ── Filter row ──────────────────────────────────── */
    .plans-filter-row {
      max-width: 1200px; margin: 0 auto 1.5rem;
      padding: 0 1.5rem;
      display: flex; gap: .75rem; align-items: center; flex-wrap: wrap;
    }
    .plan-tabs {
      display: flex; gap: .2rem;
      background: #f1f5f9; border-radius: 12px; padding: .25rem;
    }
    .plan-tab {
      padding: .45rem 1.1rem; border-radius: 9px; border: none;
      background: transparent; font-weight: 700; font-size: .82rem;
      cursor: pointer; color: #6b7280; transition: all .15s;
      white-space: nowrap; font-family: inherit;
    }
    .plan-tab.active { background: white; color: #111827; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .plans-search {
      background: white; border: 1px solid #e5e7eb; border-radius: 11px;
      padding: .45rem 1rem; font-size: .85rem; font-family: inherit;
      color: #111827; outline: none; width: 200px;
      transition: border-color .15s;
    }
    .plans-search:focus { border-color: #6366f1; }
    .plans-sort {
      background: white; border: 1px solid #e5e7eb; border-radius: 11px;
      padding: .45rem .9rem; font-size: .82rem; font-family: inherit;
      color: #374151; outline: none; cursor: pointer;
    }

    /* ── Cards grid ──────────────────────────────────── */
    .plans-grid {
      max-width: 1200px; margin: 0 auto;
      padding: 0 1.5rem 4rem;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem;
    }
    @media (max-width: 600px) {
      .plans-grid { grid-template-columns: 1fr; padding: 0 1rem 3rem; }
      .plans-filter-row { gap: .5rem; }
      .plan-tabs { flex: 1 1 100%; }
      .hero-create-btn { display: none; }
      .hero-mobile-btn { display: flex !important; }
    }

    /* ── Individual plan card ────────────────────────── */
    .plan-card {
      background: white; border-radius: 18px;
      border: 1px solid #e5e7eb; overflow: hidden;
      transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s;
      contain: layout style;
    }
    .plan-card:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(0,0,0,.08); }
    .plan-accent { height: 5px; }
    .plan-body { padding: 1.25rem; }
    .plan-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .75rem; margin-bottom: .6rem; }
    .plan-title { font-size: 1rem; font-weight: 700; color: #111827; line-height: 1.35; }
    .plan-meta { display: flex; flex-wrap: wrap; gap: .4rem .9rem; margin-bottom: .65rem; font-size: .8rem; color: #6b7280; }
    .plan-meta-item { display: flex; align-items: center; gap: .3rem; }
    .plan-desc {
      font-size: .83rem; color: #4b5563; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: .9rem;
    }
    .plan-footer {
      display: flex; gap: .5rem; padding-top: .9rem;
      border-top: 1px solid #f3f4f6; flex-wrap: wrap;
    }
    .days-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .22rem .7rem; border-radius: 20px;
      font-size: .72rem; font-weight: 700;
    }
    .plan-status-badge {
      padding: .22rem .7rem; border-radius: 20px;
      font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    }
    .ps-active    { background: #ede9fe; color: #5b21b6; }
    .ps-completed { background: #d1fae5; color: #065f46; }
    .ps-overdue   { background: #fee2e2; color: #991b1b; }

    /* ── Modal ───────────────────────────────────────── */
    .plan-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center;
      padding: 1rem; background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
    }
    .plan-modal-overlay.open { display: flex; }
    .plan-modal-card {
      background: white; border-radius: 22px; padding: 2rem;
      width: 100%; max-width: 480px;
      box-shadow: 0 25px 60px rgba(0,0,0,.18);
      animation: planSlideUp .22s ease both;
    }
    @keyframes planSlideUp {
      from { opacity: 0; transform: translateY(20px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-hdr h2 { margin: 0; font-size: 1.25rem; font-weight: 800; }
    .modal-close-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid #e5e7eb;
      background: #f9fafb; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: #6b7280; transition: background .15s;
    }
    .modal-close-btn:hover { background: #f3f4f6; }

    /* ── FAB (mobile) ────────────────────────────────── */
    .plan-fab {
      display: none;
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--primary, #6366f1); color: white;
      border: none; font-size: 1.6rem; cursor: pointer;
      box-shadow: 0 8px 24px rgba(99,102,241,.45);
      align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
    }
    .plan-fab:hover { transform: scale(1.08); }
    @media (max-width: 600px) { .plan-fab { display: flex; } }

    /* ── Empty / Loading states ──────────────────────── */
    .plans-empty {
      grid-column: 1 / -1; text-align: center;
      padding: 4rem 2rem; color: #9ca3af;
    }
    .plans-empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: .45; }
    .plans-empty h3 { font-size: 1.15rem; font-weight: 700; color: #374151; margin: 0 0 .4rem; }
    .plans-empty p  { font-size: .88rem; margin: 0; }
    .skel-plan { border-radius: 18px !important; height: 200px; }

    /* ── Dark mode ───────────────────────────────────── */
    body.dark .plans-hero    { background: linear-gradient(135deg, #020617 0%, #0f172a 55%, #1e1b4b 100%); }
    body.dark .pstat         { background: var(--bg-card, #1e293b); border-color: var(--border, #334155); }
    body.dark .pstat-val     { color: var(--text-1, #f1f5f9); }
    body.dark .pstat-label   { color: var(--text-2, #94a3b8); }
    body.dark .plan-card     { background: var(--bg-card, #1e293b); border-color: var(--border, #334155); }
    body.dark .plan-title    { color: var(--text-1, #f1f5f9); }
    body.dark .plan-desc     { color: var(--text-2, #94a3b8); }
    body.dark .plan-footer   { border-color: var(--border, #334155); }
    body.dark .plan-tabs     { background: var(--bg-2, #0f172a); }
    body.dark .plan-tab.active { background: var(--bg-card, #1e293b); color: var(--text-1, #f1f5f9); }
    body.dark .plan-modal-card { background: var(--bg-card, #1e293b); }
    body.dark .modal-hdr h2  { color: var(--text-1, #f1f5f9); }
    body.dark .plans-search  { background: var(--bg-card); border-color: var(--border); color: var(--text-1); }
    body.dark .plans-sort    { background: var(--bg-card); border-color: var(--border); color: var(--text-1); }
  </style>
</head>

  <script>
    let currentProfile = null;
    let allPlans = [];
    let currentTab = 'all';
    let isAdmin = false;

    // ── Init ──────────────────────────────────────────────────
    (async () => {
      const user = await requireAuth();
      if (!user) return;
      const profile = await getUserProfile();
      if (!profile) return;
      currentProfile = profile;
      isAdmin = profile.role === 'admin' || profile.role === 'super_admin';
      populateSidebar(profile);
      initTheme();

      document.getElementById('hero-sub').textContent =
        isAdmin ? 'Monitor team schedules and work activities' : 'Schedule your tasks and field visits';

      if (!isAdmin) {
        document.getElementById('hero-create-btn').style.display = 'flex';
        document.getElementById('plan-fab').style.display = 'flex';
        document.getElementById('plans-search').style.display = 'block';
      } else {
        document.getElementById('emp-search').style.display = 'block';
      }

      await loadPlans();
      setupRealtime();
    })();

    // ── Data ──────────────────────────────────────────────────
    async function loadPlans() {
      try {
        let q = db.from('plans').select('*, users(email, name)').order('start_date', { ascending: false });
        if (!isAdmin) q = q.eq('user_id', currentProfile.id);

        const { data, error } = await q;
        if (error) throw error;
        allPlans = data || [];
        renderStats();
        renderPlans();
      } catch (err) {
        document.getElementById('plans-grid').innerHTML =
          `<div class="plans-empty"><div class="plans-empty-icon">⚠️</div><h3>Failed to load plans</h3><p>${escHtml(err.message)}</p></div>`;
      }
    }

    // ── Stats ─────────────────────────────────────────────────
    function renderStats() {
      const today = new Date().toISOString().split('T')[0];
      const total     = allPlans.length;
      const active    = allPlans.filter(p => p.status !== 'completed' && p.end_date >= today).length;
      const completed = allPlans.filter(p => p.status === 'completed').length;
      const overdue   = allPlans.filter(p => p.status !== 'completed' && p.end_date < today).length;

      document.getElementById('plans-stats').innerHTML = `
        <div class="pstat">
          <div class="pstat-icon" style="background:rgba(99,102,241,.1);color:#6366f1">📋</div>
          <div><div class="pstat-label">Total Plans</div><div class="pstat-val">${total}</div></div>
        </div>
        <div class="pstat">
          <div class="pstat-icon" style="background:rgba(139,92,246,.1);color:#7c3aed">🔵</div>
          <div><div class="pstat-label">Active</div><div class="pstat-val">${active}</div></div>
        </div>
        <div class="pstat">
          <div class="pstat-icon" style="background:rgba(16,185,129,.1);color:#10b981">✅</div>
          <div><div class="pstat-label">Completed</div><div class="pstat-val">${completed}</div></div>
        </div>
        <div class="pstat">
          <div class="pstat-icon" style="background:rgba(239,68,68,.1);color:#ef4444">⚠️</div>
          <div><div class="pstat-label">Overdue</div><div class="pstat-val">${overdue}</div></div>
        </div>
      `;
    }

    // ── Tab / Filter ──────────────────────────────────────────
    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.plan-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      renderPlans();
    }

    function planStatus(p) {
      if (p.status === 'completed') return 'completed';
      const today = new Date().toISOString().split('T')[0];
      return p.end_date < today ? 'overdue' : 'active';
    }

    // ── Render ────────────────────────────────────────────────
    function renderPlans() {
      const searchQ = (document.getElementById('plans-search')?.value || '').toLowerCase().trim();
      const empQ    = (document.getElementById('emp-search')?.value   || '').toLowerCase().trim();
      const sort    = document.getElementById('plans-sort').value;
      const today   = new Date().toISOString().split('T')[0];

      let list = [...allPlans];

      // Tab filter
      if (currentTab !== 'all') {
        list = list.filter(p => planStatus(p) === currentTab);
      }

      // Search
      if (searchQ) list = list.filter(p => p.title.toLowerCase().includes(searchQ) || (p.description || '').toLowerCase().includes(searchQ));
      if (empQ)    list = list.filter(p => (p.users?.email || '').toLowerCase().includes(empQ) || (p.users?.name || '').toLowerCase().includes(empQ));

      // Sort
      if (sort === 'date-asc')  list.sort((a, b) => a.start_date.localeCompare(b.start_date));
      else if (sort === 'title') list.sort((a, b) => a.title.localeCompare(b.title));
      // default: date-desc (already from query)

      const grid = document.getElementById('plans-grid');

      if (list.length === 0) {
        grid.innerHTML = `
          <div class="plans-empty">
            <div class="plans-empty-icon">📂</div>
            <h3>${currentTab === 'all' ? 'No plans yet' : `No ${currentTab} plans`}</h3>
            <p>${!isAdmin && currentTab === 'all' ? 'Click "New Plan" to schedule your first work activity.' : 'Nothing matches the current filter.'}</p>
          </div>`;
        return;
      }

      grid.innerHTML = list.map(p => planCard(p, today)).join('');
    }

    function planCard(p, today) {
      const st = planStatus(p);
      const accent = st === 'completed' ? '#10b981' : st === 'overdue' ? '#ef4444' : '#6366f1';
      const badgeCls = st === 'completed' ? 'ps-completed' : st === 'overdue' ? 'ps-overdue' : 'ps-active';
      const badgeLabel = st === 'completed' ? '✓ Completed' : st === 'overdue' ? '⚠ Overdue' : '● Active';

      const start = new Date(p.start_date);
      const end   = new Date(p.end_date);
      const diffMs = end - start;
      const days = Math.round(diffMs / 86400000) + 1;
      const isOwner = p.user_id === currentProfile.id;

      // Date range label
      const fmtDate = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const dateLabel = p.start_date === p.end_date ? fmtDate(start) : `${fmtDate(start)} → ${fmtDate(end)}`;

      // Remaining / elapsed days
      let timeBadgeHtml = '';
      if (st === 'active') {
        const rem = Math.ceil((end - new Date()) / 86400000);
        timeBadgeHtml = rem > 0
          ? `<span class="days-badge" style="background:#ede9fe;color:#5b21b6">${rem}d left</span>`
          : `<span class="days-badge" style="background:#e0f2fe;color:#0369a1">Ends today</span>`;
      } else if (st === 'overdue') {
        const over = Math.ceil((new Date() - end) / 86400000);
        timeBadgeHtml = `<span class="days-badge" style="background:#fee2e2;color:#991b1b">${over}d overdue</span>`;
      }

      return `
        <div class="plan-card">
          <div class="plan-accent" style="background:${accent}"></div>
          <div class="plan-body">
            <div class="plan-top">
              <div class="plan-title">${escHtml(p.title)}</div>
              <span class="plan-status-badge ${badgeCls}">${badgeLabel}</span>
            </div>
            <div class="plan-meta">
              <span class="plan-meta-item">📅 ${escHtml(dateLabel)}</span>
              <span class="plan-meta-item">⏱ ${days} day${days !== 1 ? 's' : ''}</span>
              ${isAdmin && p.users ? `<span class="plan-meta-item">👤 ${escHtml(p.users.name || p.users.email)}</span>` : ''}
            </div>
            ${p.description ? `<div class="plan-desc">${escHtml(p.description)}</div>` : ''}
            <div class="plan-footer">
              ${timeBadgeHtml}
              <div style="flex:1"></div>
              ${isOwner && st !== 'completed' ? `
                <button onclick="editPlan('${p.id}')" class="btn btn-secondary btn-sm" style="padding:.3rem .75rem;font-size:.75rem">Edit</button>
                <button onclick="markCompleted('${p.id}')" class="btn btn-primary btn-sm" style="padding:.3rem .9rem;font-size:.75rem">Mark Done</button>
              ` : ''}
              ${(isOwner || isAdmin) && st !== 'completed' ? '' : ''}
              ${isOwner && st === 'completed' ? `<span style="font-size:.75rem;color:#10b981;font-weight:600">✓ Plan complete</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    // ── CRUD ──────────────────────────────────────────────────
    function openPlanModal(editId = '') {
      document.getElementById('p-edit-id').value = editId;
      document.getElementById('modal-title-text').textContent = editId ? 'Edit Work Plan' : 'New Work Plan';
      document.getElementById('p-btn').textContent = editId ? 'Update Plan' : 'Save Plan';
      if (!editId) {
        document.getElementById('plan-form').reset();
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('p-start').value = today;
        document.getElementById('p-end').value   = today;
      }
      document.getElementById('plan-modal').classList.add('open');
      setTimeout(() => document.getElementById('p-title').focus(), 50);
    }

    function closePlanModal() {
      document.getElementById('plan-modal').classList.remove('open');
    }

    function editPlan(id) {
      const p = allPlans.find(x => x.id === id);
      if (!p) return;
      openPlanModal(id);
      document.getElementById('p-title').value = p.title;
      document.getElementById('p-start').value = p.start_date;
      document.getElementById('p-end').value   = p.end_date;
      document.getElementById('p-desc').value  = p.description || '';
    }

    async function handleSavePlan(e) {
      e.preventDefault();
      const btn = document.getElementById('p-btn');
      const editId    = document.getElementById('p-edit-id').value;
      const title      = document.getElementById('p-title').value.trim();
      const start_date = document.getElementById('p-start').value;
      const end_date   = document.getElementById('p-end').value;
      const description = document.getElementById('p-desc').value.trim();

      if (end_date < start_date) { showMessage('End date cannot be before start date.', 'error'); return; }

      setLoading(btn, true);
      try {
        if (editId) {
          const { error } = await db.from('plans').update({ title, start_date, end_date, description }).eq('id', editId).eq('user_id', currentProfile.id);
          if (error) throw error;
          showMessage('Plan updated!', 'success');
        } else {
          const { error } = await db.from('plans').insert([{ user_id: currentProfile.id, title, start_date, end_date, description }]);
          if (error) throw error;
          showMessage('Plan created!', 'success');
        }
        closePlanModal();
        await loadPlans();
      } catch (err) {
        showMessage(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    async function markCompleted(id) {
      try {
        const { error } = await db.from('plans').update({ status: 'completed' }).eq('id', id).eq('user_id', currentProfile.id);
        if (error) throw error;
        showMessage('Plan marked as completed! 🎉', 'success');
        await loadPlans();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    // Close modal on overlay click
    document.getElementById('plan-modal').addEventListener('click', function(e) {
      if (e.target === this) closePlanModal();
    });

    // Keyboard shortcut: Escape to close
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePlanModal();
    });

    // ── Realtime ──────────────────────────────────────────────
    let _rtTimer = null;
    function setupRealtime() {
      db.channel('rt-plans')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'plans' }, () => {
          clearTimeout(_rtTimer);
          _rtTimer = setTimeout(loadPlans, 600);
        })
        .subscribe();
    }

    // ── Theme ─────────────────────────────────────────────────
    function initTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        updateThemeUI(true);
      }
    }
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeUI(isDark);
    }
    function updateThemeUI(isDark) {
      const icon = document.getElementById('theme-icon');
      const text = document.getElementById('theme-text');
      if (icon) icon.textContent = isDark ? '☀️' : '🌙';
      if (text) text.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }
  </script>
</body>

</html>
